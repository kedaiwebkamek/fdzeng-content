backend:
  name: github
  repo: kedaiwebkamek/fdzeng-content
  branch: master
  base_url: https://www.fdzeng.com
  auth_endpoint: /api/auth

publish_mode: editorial_workflow

media_folder: "uploads"
public_folder: "/uploads"

collections:

  # ── 1. PROJECTS ─────────────────────────────────────────────────────────────
  - name: projects
    label: Projects
    folder: content/projects
    identifier_field: description
    slug: "{{slug}}"
    extension: json
    format: json
    create: true
    summary: "{{status}} — {{description}}"
    sortable_fields: ['status']
    search_fields: ['description', 'client', 'cat', 'division', 'loc', 'status']
    view_filters:
      - label: Sedang Berjalan
        field: status
        pattern: Ongoing
      - label: Siap
        field: status
        pattern: Completed
    fields:

      # ── Status & Tarikh ──────────────────────────────────────────────────────
      - name: status
        label: "Status Projek"
        widget: select
        required: true
        options:
          - { label: "Sedang Berjalan — Projek masih aktif", value: "Ongoing" }
          - { label: "Siap — Projek telah selesai & diserahkan", value: "Completed" }
        hint: "Pilih Sedang Berjalan jika projek masih dalam pembinaan. Pilih Siap jika projek telah diserahkan kepada klien."

      - name: date
        label: "Tarikh Siap"
        widget: date-conditional
        required: false
        hint: "Diperlukan untuk projek Siap sahaja. Format: DD Bulan YYYY — contoh: 29 Jan 2019. Bulan (BM): Jan Feb Mac Apr Mei Jun Jul Ogo Sep Okt Nov Dis"

      # ── Maklumat Projek ──────────────────────────────────────────────────────
      - name: description
        label: "Tajuk Projek"
        widget: string
        required: true
        hint: "Tajuk ringkas dan jelas menggambarkan projek. Contoh: Cadangan Pembinaan Jalan Penghubung Kg. Stass, Kota Samarahan"

      - name: client
        label: "Klien / Majikan"
        widget: string
        required: true
        hint: "Nama penuh klien atau agensi yang menguruskan projek. Contoh: Jabatan Kerja Raya Sarawak, PETRONAS Carigali, Suruhanjaya Perkhidmatan Air Negeri (SPAN)"

      - name: amount
        label: "Nilai Projek (RM)"
        widget: currency-myr
        required: true
        hint: "Masukkan nilai kontrak dalam ANGKA SAHAJA — tanpa RM, koma, atau titik perpuluhan. Contoh: taip 10000000 untuk RM 10,000,000"

      - name: cat
        label: "Kategori Projek"
        widget: select
        required: true
        options:
          - { label: "Building — Bangunan & Fasiliti", value: "Building" }
          - { label: "Infrastructure — Jalan, Jambatan & Longkang", value: "Infrastructure" }
          - { label: "Maintenance — Penyelenggaraan & Baik Pulih", value: "Maintenance" }
          - { label: "Telecom — Telekomunikasi & Fiber Optik", value: "Telecom" }
          - { label: "Utilities — Air & Elektrik", value: "Utilities" }
        hint: "Pilih kategori yang paling tepat menggambarkan skop kerja projek. Ini juga menentukan warna pin pada peta projek."

      # ── Maklumat Lokasi ──────────────────────────────────────────────────────
      - name: division
        label: "Bahagian (Division)"
        widget: select
        required: true
        options:
          - Kuching
          - Samarahan
          - Sri Aman
          - Betong
          - Sarikei
          - Sibu
          - Mukah
          - Kapit
          - Bintulu
          - Miri
          - Limbang
          - Lawas
        hint: "Pilih bahagian pentadbiran Sarawak tempat projek ini dilaksanakan."

      - name: loc
        label: "Lokasi Penuh"
        widget: string
        required: true
        hint: "Nama lokasi yang lebih spesifik daripada bahagian. Contoh: Kampung Stass, Kota Samarahan atau Jalan Oya, Sibu, Sarawak"

      - name: coordinates
        label: "Koordinat GPS"
        widget: string
        required: true
        pattern: ['^-?[0-9]+\.[0-9]+,\s*-?[0-9]+\.[0-9]+$', 'Format tidak sah. Contoh betul: 1.551230, 110.372326']
        hint: |
          Cara cepat dapatkan koordinat dari Google Maps:
          1. Buka maps.google.com
          2. Cari nama lokasi projek → tekan Enter
          3. Klik kanan tepat pada titik lokasi di peta
          4. Baris pertama yang muncul dalam menu = koordinat (contoh: 1.551230, 110.372326)
          5. Klik pada nombor koordinat itu — ia akan copy secara automatik
          6. Paste terus di kotak ini
          ⚠ Pastikan ada KOMA (,) di antara dua nombor. Contoh betul: 1.551230, 110.372326

      - name: accuracy
        label: "Nota Lokasi (Pilihan)"
        widget: string
        required: false
        hint: "Kosongkan jika koordinat adalah lokasi tepat tapak projek. Isi jika koordinat hanya anggaran. Contoh: Sekitar Kampung Asajaya, koordinat bukan lokasi tepat tapak projek"

      # ── Paparan & Media ──────────────────────────────────────────────────────
      - name: isPilihan
        label: "Papar di Homepage (Projek Pilihan)"
        widget: boolean
        default: false
        hint: "Aktifkan untuk paparkan projek ini dalam carousel Projek Pilihan di halaman utama. Jangan aktifkan lebih daripada 10 projek serentak."

      - name: paragraph
        label: "Penerangan Lanjut"
        widget: text
        required: false
        hint: "Huraian panjang tentang projek — boleh masukkan skop kerja, kepentingan projek, atau maklumat teknikal. Akan dipaparkan dalam tetingkap butiran projek. Boleh kosongkan jika tiada maklumat tambahan."

      - name: images
        label: "Gambar Projek"
        widget: list
        required: false
        summary: "{{fields.alt}}"
        hint: "⭐ PENTING: Gambar PERTAMA dalam senarai = gambar utama (thumbnail) yang dipaparkan pada kad projek dan carousel homepage. Gambar selebihnya akan dipaparkan dalam galeri modal. Upload terus atau masukkan URL. Format: JPG/PNG, saiz maksimum 5MB setiap gambar."
        fields:
          - name: src
            label: "Gambar"
            widget: image
            required: true
            default: ""
            hint: "Upload gambar dari komputer ATAU masukkan URL penuh bermula https://. ⚠ Elakkan URL dari Facebook — URL Facebook akan tamat tempoh dan gambar tidak akan dipaparkan."
          - name: alt
            label: "Penerangan Gambar (Alt Text)"
            widget: string
            required: false
            default: ""
            hint: "Tulis penerangan ringkas gambar ini. Membantu Google kenali gambar anda (SEO). Contoh: Kerja pembesaran jalan raya di Jalan Oya, Sibu"

      - name: newsList
        label: "Pautan Berita (Pilihan)"
        widget: list
        required: false
        summary: "{{fields.title}}"
        hint: "Tambah pautan ke artikel berita, siaran akhbar, atau laporan berkaitan projek ini. Kosongkan jika tiada."
        fields:
          - name: title
            label: "Tajuk Artikel"
            widget: string
            required: true
            hint: "Tajuk artikel atau berita. Contoh: Majlis Penyerahan Projek Jalan Raya Samarahan"
          - name: link
            label: "URL Artikel"
            widget: string
            required: true
            hint: "Salin URL penuh dari bar alamat browser. Contoh: https://www.malaysiakini.com/news/xxxxx"
            pattern: ['^https?://.+', 'Mesti bermula https:// atau http://']

      - name: videoList
        label: "Pautan Video (Pilihan)"
        widget: list
        required: false
        summary: "{{fields.title}}"
        hint: "Tambah pautan video YouTube atau platform lain berkaitan projek ini. Kosongkan jika tiada."
        fields:
          - name: title
            label: "Tajuk Video"
            widget: string
            required: true
            hint: "Tajuk video. Contoh: Video Kemajuan Projek Pembinaan Jambatan Sg. Sarawak"
          - name: link
            label: "URL Video"
            widget: string
            required: true
            hint: "Salin URL penuh dari bar alamat YouTube atau platform video. Contoh: https://www.youtube.com/watch?v=xxxxxxxxx"
            pattern: ['^https?://.+', 'Mesti bermula https:// atau http://']

  # ── 2. CERTIFICATIONS ───────────────────────────────────────────────────────
  - name: certifications
    label: Certifications
    folder: content/certifications
    extension: json
    format: json
    create: true
    search_fields: ['title', 'issuer', 'category', 'num']
    fields:

      - name: num
        label: "Nombor Sijil"
        widget: string
        required: true
        pattern: ['^[0-9]{2}$', 'Mesti 2 digit. Contoh: 01, 09, 15']
        hint: "Nombor unik 2 digit untuk sijil ini. Sijil terkini: No. 14 — gunakan 15 untuk sijil baharu. Semak senarai sijil sedia ada sebelum menetapkan nombor baru."

      - name: title
        label: "Nama Sijil"
        widget: string
        required: true
        hint: "Nama penuh sijil atau kelayakan. Contoh: CIDB G7 — Gred Tertinggi Pembinaan, atau Pensijilan ISO 9001:2015 Sistem Pengurusan Kualiti"

      - name: issuer
        label: "Badan Pengeluar"
        widget: string
        required: true
        hint: "Nama penuh agensi atau badan yang mengeluarkan sijil ini. Contoh: Lembaga Pembangunan Industri Pembinaan Malaysia (CIDB), SIRIM QAS International Sdn. Bhd."

      - name: brief
        label: "Penerangan Ringkas"
        widget: text
        required: false
        hint: "Penerangan ringkas tentang sijil ini — dipaparkan sebagai tooltip 'info' (ⓘ) pada kad dan senarai sijil di laman web. Terangkan apa sijil ini membolehkan syarikat lakukan. Tag HTML ringkas seperti <em>...</em> (italik) dibenarkan."

      - name: category
        label: "Kategori Sijil"
        widget: select
        required: true
        options:
          - { label: "Contractor — Pendaftaran Kontraktor (CIDB, UPKJ, TM)", value: "contractor" }
          - { label: "Quality — Kualiti & Keselamatan (ISO, DOSH, BOMBA)", value: "quality" }
          - { label: "Petroleum — Minyak & Gas (PETRONAS, PETROS)", value: "petroleum" }
          - { label: "Government — Kerajaan & Perniagaan (MOF, SSM, SPAN)", value: "government" }
          - { label: "Telecom — Telekomunikasi & Rangkaian", value: "telecom" }
        hint: "Pilih kategori yang paling tepat menggambarkan jenis sijil ini. Ini menentukan pengelompokan sijil dalam halaman Sijil."

      - name: tags
        label: "Tag Carian"
        widget: list
        required: false
        field: { name: tag, label: Tag, widget: string }
        hint: "Kata kunci untuk memudahkan carian sijil. Tambah satu tag pada satu masa. Contoh: G7, CIDB, ISO 9001, Bumiputera, UPKJ Kelas A"

      - name: status
        label: "Status Sijil"
        widget: select
        required: true
        options:
          - { label: "Aktif — Sijil masih sah dan dalam tempoh", value: "Aktif" }
          - { label: "Tamat — Sijil telah luput atau tidak diperbaharui", value: "Tamat" }
        hint: "Tukar kepada Tamat apabila sijil luput. Sijil Tamat masih dipaparkan dalam senarai tetapi tanpa lencana hijau."

      - name: validUntil
        label: "Tarikh Luput (Pilihan)"
        widget: string
        required: false
        hint: "Tarikh sijil luput dalam format ISO. Contoh: 2027-04-05. Kosongkan jika sijil tidak ada tarikh luput (contoh: SSM, ISO yang sentiasa diperbaharui)."

      - name: meta
        label: "Butiran Sijil (Label & Nilai)"
        widget: list
        required: false
        label_singular: "Butiran"
        summary: "{{fields.label}}: {{fields.value}}"
        hint: "Baris butiran yang dipaparkan pada sijil (contoh: No. Pendaftaran, Tarikh Mula, Tarikh Luput, Gred). Tambah satu baris untuk setiap butiran — 'Label' di kiri, 'Nilai' di kanan."
        fields:
          - name: label
            label: "Label"
            widget: string
            hint: "Nama butiran. Contoh: No. Pendaftaran, Tarikh Luput, Gred B, Kategori"
          - name: value
            label: "Nilai"
            widget: string
            hint: "Nilai butiran. Contoh: 0120110824-SR135974, 16/09/2029, G7/B"

      - name: isFeatured
        label: "Papar dalam Sijil Pilihan"
        widget: boolean
        default: false
        hint: "Aktifkan untuk papar sijil ini dalam 6 kad utama di bahagian atas halaman Sijil. Maksimum 6 sijil boleh dipilih serentak — semak sijil lain sebelum aktifkan."

      - name: featuredOrder
        label: "Kedudukan dalam Grid (1–6)"
        widget: number
        required: false
        default: 0
        value_type: int
        hint: "Tentukan slot kedudukan sijil (1 = pertama/kiri, 6 = terakhir/kanan). Hanya digunakan jika 'Papar dalam Sijil Pilihan' diaktifkan di atas. Biarkan 0 jika tidak dipilih."
        pattern: ['^[0-6]$', 'Nombor 0 hingga 6 sahaja']

      - name: featuredTitle
        label: "Tajuk Ganti — Kad Pilihan (Pilihan)"
        widget: string
        required: false
        hint: "Pilihan. Jika diisi, tajuk ini menggantikan 'Nama Sijil' HANYA pada kad Sijil Pilihan (biasanya versi lebih ringkas/pendek). Kosongkan untuk guna Nama Sijil biasa."

      - name: featuredIssuer
        label: "Badan Pengeluar Ganti — Kad Pilihan (Pilihan)"
        widget: string
        required: false
        hint: "Pilihan. Jika diisi, menggantikan 'Badan Pengeluar' pada kad Sijil Pilihan sahaja. Kosongkan untuk guna Badan Pengeluar biasa."

      - name: logoImage
        label: "Logo Sijil (Pilihan)"
        widget: image
        required: false
        hint: "Logo badan pengeluar untuk dipaparkan pada kad sijil pilihan. Saiz cadangan: 120×80px. Format: PNG atau SVG dengan latar telus. Kosongkan jika tiada — ikon teks akan digunakan sebagai ganti."

      - name: iconName
        label: "Nama Ikon"
        widget: string
        required: true
        hint: |
          Nama ikon dari Google Material Symbols — dipaparkan dalam senarai sijil.
          Ikon disyorkan mengikut kategori:
          • Kontraktor : engineering, construction, domain, handyman, build
          • Kualiti/ISO : verified, shield, health_and_safety, workspace_premium, fact_check
          • Petroleum   : water_drop, local_gas_station, factory, bolt, oil_barrel
          • Kerajaan    : account_balance, business_center, gavel, badge, policy
          • Telekom     : cell_tower, router, cable, wifi, hub
          Lihat semua ikon di: fonts.google.com/icons — cari nama dan copy persis seperti yang terpapar (huruf kecil, garis bawah).

      - name: iconColor
        label: "Warna Ikon"
        widget: select
        required: true
        options:
          - { label: "Merah — sijil utama atau kontraktor", value: "red" }
          - { label: "Kelabu — sijil am atau tidak aktif", value: "grey" }
          - { label: "Hijau — sijil kualiti atau keselamatan", value: "green" }
          - { label: "Biru — sijil kerajaan atau profesional", value: "blue" }
          - { label: "Oren — sijil petroleum atau tenaga", value: "orange" }
        hint: "Warna latar dan warna ikon dalam senarai sijil."

      - name: downloadFile
        label: "Fail Sijil PDF (Pilihan)"
        widget: file
        required: false
        hint: "Upload salinan sijil asal dalam format PDF. Pengguna laman web perlu masukkan nama dan organisasi mereka sebelum boleh muat turun. Saiz maksimum: 5MB. Kosongkan jika tidak mahu sijil ini boleh dimuat turun."
        media_library:
          config:
            max_file_size: 5242880

  # ── 3. GALLERY ───────────────────────────────────────────────────────────────
  - name: gallery
    label: Gallery
    files:
      - name: gallery
        label: Kerja Di Lapangan Gallery
        file: content/gallery.json
        fields:
          - name: header
            label: Header
            widget: object
            fields:
              - name: label
                label: Label
                widget: string
                hint: "Label kecil di atas tajuk. Contoh: GALERI KAMI"
              - name: title
                label: Title
                widget: string
                hint: "Tajuk utama bahagian gallery. Contoh: Kerja Di Lapangan"
              - name: description
                label: Description
                widget: text
                hint: "Ayat penerangan ringkas di bawah tajuk gallery."
          - name: facebookUrl
            label: Facebook URL
            widget: string
            hint: "URL penuh halaman Facebook FDZ Engineering untuk butang 'Lihat Lebih Banyak'. Contoh: https://www.facebook.com/fdzengineering"
          - name: items
            label: Gallery Items
            widget: list
            fields:
              - name: id
                label: ID
                widget: string
                hint: "ID unik untuk setiap gambar. Gunakan format ringkas tanpa ruang. Contoh: gallery-001, site-kuching-01"
              - name: src
                label: Image
                widget: image
                hint: "Upload gambar kerja di lapangan. Format: JPG/PNG. Saiz maksimum 5MB."
              - name: alt
                label: Alt Text
                widget: string
                hint: |
                  Alt Text = penerangan ringkas gambar dalam bentuk teks.
                  Digunakan oleh Google untuk kenali gambar (membantu SEO) dan oleh pembaca skrin.
                  Contoh baik: "Kerja pembinaan jambatan di Sibu, Sarawak" atau "Pemasangan paip air di tapak projek Miri"
                  Elakkan: "gambar1", "foto", atau biarkan kosong.
