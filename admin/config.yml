backend:
  name: github
  repo: kedaiwebkamek/fdzeng-content
  branch: master
  base_url: https://www.fdzeng.com
  auth_endpoint: /api/auth

publish_mode: editorial_workflow

media_folder: "uploads"
public_folder: "/uploads"

collections:

  # ── 1. PROJECTS ─────────────────────────────────────────────────────────────
  - name: projects
    label: Projects
    folder: content/projects
    identifier_field: description
    slug: "{{slug}}"
    extension: json
    format: json
    create: true
    # Per-project media folder: each project's uploaded images go into their own
    # /uploads/projects/<slug>/ folder, and the media library is scoped to it —
    # so when editing a project you only see THAT project's photos, not a giant
    # shared pile. Leading slash = relative to the repo root (matches the existing
    # /uploads/projects/<slug>/ structure). {{slug}} = the project's slug.
    media_folder: "/uploads/projects/{{slug}}"
    public_folder: "/uploads/projects/{{slug}}"
    summary: "{{status}} · {{division}} — {{description}}"
    sortable_fields: ['description', 'status', 'client', 'division']
    search_fields: ['description', 'client', 'cat', 'division', 'loc', 'year', 'status', 'accuracy', 'tags']
    view_filters:
      - { label: "Ongoing", field: status, pattern: Ongoing }
      - { label: "Completed", field: status, pattern: Completed }
      - { label: "Category: Building & Facilities", field: cat, pattern: Building }
      - { label: "Category: Infrastructure", field: cat, pattern: Infrastructure }
      - { label: "Category: Maintenance", field: cat, pattern: Maintenance }
      - { label: "Category: Telecom", field: cat, pattern: Telecom }
      - { label: "Category: Utilities (Water & Electrical)", field: cat, pattern: Utilities }
    view_groups:
      - { label: "Group: Category", field: cat }
      - { label: "Group: Division", field: division }
      - { label: "Group: Status", field: status }
    fields:

      # ── Status & Date ────────────────────────────────────────────────────────
      - name: status
        label: "Project Status"
        widget: select
        required: true
        options:
          - { label: "Ongoing — Project still active", value: "Ongoing" }
          - { label: "Completed — Project finished & handed over", value: "Completed" }
        hint: "Choose Ongoing if the project is still under construction. Choose Completed if the project has been handed over to the client."

      - name: date
        label: "Completion Date"
        widget: date-conditional
        required: false
        hint: "Required for Completed projects only. PICK a date from the calendar — it fills in automatically in the format 29 Jan 2019. (This field is hidden automatically for Ongoing projects.)"

      # ── Project Details ──────────────────────────────────────────────────────
      - name: description
        label: "Project Title"
        widget: string
        required: true
        hint: "A short, clear title describing the project. Example: Cadangan Pembinaan Jalan Penghubung Kg. Stass, Kota Samarahan"

      # Deliberately NOT required: 41 of 53 existing projects have no client yet.
      # If this were required, opening one of those projects just to add photos
      # would refuse to save until a client was invented.
      - name: client
        label: "Client / Employer"
        widget: string
        required: false
        hint: "Full name of the client or agency managing the project. Example: Jabatan Kerja Raya Sarawak, PETRONAS Carigali, Suruhanjaya Perkhidmatan Air Negeri (SPAN). Leave blank if it is not confirmed yet — you can add it later."

      - name: amount
        label: "Project Value (RM)"
        widget: currency-myr
        required: true
        hint: "Enter the contract value in NUMBERS ONLY — without RM, commas, or decimal points. Example: type 10000000 for RM 10,000,000"

      - name: cat
        label: "Project Category"
        widget: select
        required: true
        options:
          - { label: "Building — Buildings & Facilities", value: "Building" }
          - { label: "Infrastructure — Roads, Bridges & Drains", value: "Infrastructure" }
          - { label: "Maintenance — Maintenance & Repair", value: "Maintenance" }
          - { label: "Telecom — Telecommunications & Fiber Optic", value: "Telecom" }
          - { label: "Utilities — Water & Electrical", value: "Utilities" }
        hint: "Choose the category that best describes the project's scope of work. This also determines the pin color on the project map."

      # ── Location Details ─────────────────────────────────────────────────────
      - name: division
        label: "Division"
        widget: select
        required: true
        options:
          - Kuching
          - Samarahan
          - Sri Aman
          - Betong
          - Sarikei
          - Sibu
          - Mukah
          - Kapit
          - Bintulu
          - Miri
          - Limbang
          - Lawas
        hint: "Choose the Sarawak administrative division where this project is carried out."

      - name: loc
        label: "Full Location"
        widget: string
        required: true
        hint: "A more specific location name than the division. Example: Kampung Stass, Kota Samarahan or Jalan Oya, Sibu, Sarawak"

      - name: coordinates
        label: "GPS Coordinates (Map)"
        widget: coordinate-map
        required: true
        pattern: ['^-?[0-9]+\.[0-9]+,\s*-?[0-9]+\.[0-9]+$', 'Invalid format. Correct example: 1.551230, 110.372326']
        hint: |
          CLICK on the map below to set the project location (or drag the marker) — coordinates fill in automatically.
          Alternative (type manually): get coordinates from Google Maps → right-click the location → click the coordinate numbers to copy → paste into the box.
          ⚠ Format: 1.551230, 110.372326 (there must be a COMMA between the two numbers).

      - name: accuracy
        label: "Location Note"
        widget: string
        required: false
        hint: "Leave blank if the coordinates are the exact project site location. Fill in if the coordinates are only approximate. Example: Around Kampung Asajaya, coordinates are not the exact project site"

      # ── Display & Media ──────────────────────────────────────────────────────
      # (Featured Projects / homepage carousel is now managed in the "Featured
      #  Projects ⭐" tab — pick & order projects there, not via a per-project toggle.)

      - name: images
        label: "Project Images"
        widget: list
        required: false
        summary: "{{fields.src}}"
        hint: "⭐ IMPORTANT: The FIRST image in the list = the main image (thumbnail) shown on the project card and homepage carousel. The remaining images are shown in the modal gallery. Upload directly or enter a URL. Format: JPG/PNG, maximum size 5MB per image. (Image descriptions for Google/SEO are generated automatically — nothing to fill in.)"
        fields:
          - name: src
            label: "Image"
            widget: image
            required: true
            default: ""
            media_library:
              config:
                max_file_size: 5242880
            hint: "Upload an image from your computer OR enter a full URL starting with https://. Maximum size 5MB. ⚠ Avoid URLs from Facebook — Facebook URLs will expire and the image will not display."

      # Advanced / optional fields — collapsed by default in the editor (see the
      # "Maklumat Tambahan" toggle wired in admin/index.html) to declutter the form.
      - name: paragraph
        label: "Detailed Description"
        widget: text
        required: false
        hint: "A longer description of the project — you may include the scope of work, project significance, or technical information. It will be shown in the project details window. Can be left blank if there is no additional information."

      - name: newsList
        label: "News Links"
        widget: list
        required: false
        summary: "{{fields.title}}"
        hint: "Add links to news articles, press releases, or reports related to this project. Leave blank if none."
        fields:
          - name: title
            label: "Article Title"
            widget: string
            required: true
            hint: "The article or news title. Example: Handover Ceremony of the Samarahan Road Project"
          - name: link
            label: "Article URL"
            widget: string
            required: true
            hint: "Copy the full URL from the browser address bar. Example: https://www.malaysiakini.com/news/xxxxx"
            pattern: ['^https?://.+', 'Must start with https:// or http://']

      - name: videoList
        label: "Video Links"
        widget: list
        required: false
        summary: "{{fields.title}}"
        hint: "Add YouTube or other platform video links related to this project. Leave blank if none."
        fields:
          - name: title
            label: "Video Title"
            widget: string
            required: true
            hint: "The video title. Example: Progress Video of the Sg. Sarawak Bridge Construction"
          - name: link
            label: "Video URL"
            widget: string
            required: true
            hint: "Copy the full URL from the YouTube or video platform address bar. Example: https://www.youtube.com/watch?v=xxxxxxxxx"
            pattern: ['^https?://.+', 'Must start with https:// or http://']

  # ── 1b. FEATURED PROJECTS (curated homepage carousel — pick & order) ─────────
  - name: featured-config
    label: "Featured Projects ⭐"
    files:
      - name: featured-projects
        label: "Featured Projects Order (Homepage + Projects Page)"
        file: content/featured-projects.json
        description: "Pick & order the projects shown in the 'Featured Projects' section. This ONE list controls BOTH the carousel on the Homepage AND the featured section on the Projects page — they always show the same projects in the same order."
        fields:
          - name: items
            label: "Featured Projects (in display order)"
            label_singular: "Featured Project"
            widget: list
            summary: "{{fields.project}}"
            fields:
              - name: project
                label: "Project"
                widget: relation
                collection: projects
                search_fields: ['description']
                display_fields: ['description']
                value_field: description
                options_length: 100
                hint: "Search for a project name and pick from the list. Drag items to reorder — this order sets the sequence in BOTH the homepage carousel and the projects-page featured section."

  # ── 2. CERTIFICATIONS ───────────────────────────────────────────────────────
  - name: certifications
    label: Certifications
    folder: content/certifications
    extension: json
    format: json
    create: true
    summary: "{{title}} — {{issuer}}"
    search_fields: ['title', 'issuer', 'category', 'num', 'status', 'brief']
    sortable_fields: ['title', 'issuer', 'category', 'status']
    view_filters:
      - { label: "Active", field: status, pattern: Aktif }
      - { label: "Expired", field: status, pattern: Tamat }
      - { label: "Category: Contractor", field: category, pattern: contractor }
      - { label: "Category: Quality", field: category, pattern: quality }
      - { label: "Category: Petroleum", field: category, pattern: petroleum }
      - { label: "Category: Government", field: category, pattern: government }
      - { label: "Category: Telecom", field: category, pattern: telecom }
    view_groups:
      - { label: "Group: Category", field: category }
      - { label: "Group: Status", field: status }
    fields: &cert_fields

      - name: num
        label: "Certificate Number (Internal)"
        widget: string
        required: false
        pattern: ['^$|^[0-9]{2}$', 'Empty or 2 digits. Example: 01, 09, 15']
        hint: "Internal reference only — this number is NOT shown on the website. Can be left blank. (Used only for internal search.)"

      - name: title
        label: "Certificate Name"
        widget: string
        required: true
        hint: "Full name of the certificate or qualification. Example: CIDB G7 — Highest Construction Grade, or ISO 9001:2015 Quality Management System Certification"

      - name: issuer
        label: "Issuing Body"
        widget: string
        required: true
        hint: "Full name of the agency or body that issued this certificate. Example: Lembaga Pembangunan Industri Pembinaan Malaysia (CIDB), SIRIM QAS International Sdn. Bhd."

      - name: brief
        label: "Short Description"
        widget: text
        required: false
        hint: "A short description of this certificate — shown as an 'info' (ⓘ) tooltip on the certificate cards and list on the website. Explain what this certificate allows the company to do. Simple HTML tags like <em>...</em> (italic) are allowed."

      - name: category
        label: "Certificate Category"
        widget: select
        required: true
        options:
          - { label: "Contractor — Contractor Registration (CIDB, UPKJ, TM)", value: "contractor" }
          - { label: "Quality — Quality & Safety (ISO, DOSH, BOMBA)", value: "quality" }
          - { label: "Petroleum — Oil & Gas (PETRONAS, PETROS)", value: "petroleum" }
          - { label: "Government — Government & Business (MOF, SSM, SPAN)", value: "government" }
          - { label: "Telecom — Telecommunications & Networks", value: "telecom" }
        hint: "Choose the category that best describes this type of certificate. This determines how certificates are grouped on the Certifications page."

      - name: tags
        label: "Search Tags"
        widget: list
        required: false
        field: { name: tag, label: Tag, widget: string }
        hint: "Keywords to make certificates easier to find. Add one tag at a time. Example: G7, CIDB, ISO 9001, Bumiputera, UPKJ Class A"

      - name: status
        label: "Certificate Status"
        widget: select
        required: true
        default: "Aktif"
        options:
          - { label: "Active — Certificate is still valid and within its period", value: "Aktif" }
          - { label: "Expired — Certificate has lapsed or was not renewed", value: "Tamat" }
        hint: "Change to Expired when the certificate lapses. Expired certificates are still shown in the list but without the green badge."

      # Calendar picker, but still STORED as ISO YYYY-MM-DD — certificates.html
      # does `new Date(validUntil)`, so the stored format must not change.
      # `format` governs what is written to the JSON; `date_format` is only what
      # the owner sees in the picker.
      - name: validUntil
        label: "Expiry Date"
        widget: datetime
        required: false
        default: ""
        format: "YYYY-MM-DD"
        date_format: "DD MMM YYYY"
        time_format: false
        picker_utc: true
        hint: "PICK the expiry date from the calendar. This is the ONLY place to set it — the 'Valid until' line is shown and coloured automatically on the website. DO NOT add an expiry row in the Certificate Details below. Leave blank if the certificate never expires (example: SSM)."

      - name: meta
        label: "Certificate Details (Label & Value)"
        widget: list
        required: false
        label_singular: "Detail"
        summary: "{{fields.label}}: {{fields.value}}"
        hint: "Detail rows shown on the certificate (example: Registration No., Start Date, Grade). Add one row for each detail — 'Label' on the left, 'Value' on the right. NOTE: do not add a 'Valid until'/'Expiry Date' row here — it is handled by the Expiry Date field above."
        fields:
          - name: label
            label: "Label"
            widget: string
            hint: "The detail name. Example: Registration No., Expiry Date, Grade B, Category"
          - name: value
            label: "Value"
            widget: string
            hint: "The detail value. Example: 0120110824-SR135974, 16/09/2029, G7/B"

      # No "Show in Featured Certificates" checkbox: a certificate is featured
      # purely by being added to the "Featured Certificates ⭐" tab — same as
      # Featured Projects. (Previously you had to tick a box here AND add it
      # there; doing only one silently did nothing.)

      - name: featuredTitle
        label: "Replacement Title — Featured Card"
        widget: string
        required: false
        hint: "Optional. If filled, this title replaces the 'Certificate Name' ONLY on the Featured Certificate card (usually a shorter version). Leave blank to use the regular Certificate Name."

      - name: featuredIssuer
        label: "Replacement Issuing Body — Featured Card"
        widget: string
        required: false
        hint: "Optional. If filled, replaces the 'Issuing Body' on the Featured Certificate card only. Leave blank to use the regular Issuing Body."

      - name: logoImage
        label: "Certificate Logo"
        widget: image
        required: false
        media_library:
          config:
            max_file_size: 5242880
        hint: "Logo of the issuing body to display on the featured certificate card. Recommended size: 120×80px. Format: PNG or SVG with a transparent background. Leave blank if none — a text icon will be used instead."

      - name: iconName
        label: "Icon Name (Fallback)"
        widget: string
        required: false
        hint: |
          Fallback icon — shown ONLY if no Certificate Logo is uploaded. If there is a logo, this field is ignored; it can be left blank.
          Icon name from Google Material Symbols.
          Recommended icons by category:
          • Contractor : engineering, construction, domain, handyman, build
          • Quality/ISO : verified, shield, health_and_safety, workspace_premium, fact_check
          • Petroleum   : water_drop, local_gas_station, factory, bolt, oil_barrel
          • Government   : account_balance, business_center, gavel, badge, policy
          • Telecom      : cell_tower, router, cable, wifi, hub
          See all icons at: fonts.google.com/icons — search the name and copy it exactly as shown (lowercase, underscores).

      - name: iconColor
        label: "Icon Color (Fallback)"
        widget: select
        required: false
        default: "grey"
        options:
          - { label: "Red — main or contractor certificate", value: "red" }
          - { label: "Grey — general or inactive certificate", value: "grey" }
          - { label: "Green — quality or safety certificate", value: "green" }
          - { label: "Blue — government or professional certificate", value: "blue" }
          - { label: "Orange — petroleum or energy certificate", value: "orange" }
        hint: "Fallback icon color — only relevant if no Certificate Logo is uploaded. Leave as Grey if the certificate has a logo."

      - name: downloadFile
        label: "Certificate PDF File"
        widget: file
        required: false
        hint: "Upload a copy of the original certificate in PDF format. Website users must enter their name and organization before they can download. Maximum size: 5MB. Leave blank if you don't want this certificate to be downloadable."
        media_library:
          config:
            max_file_size: 5242880

  # ── 2b. FEATURED CERTIFICATES ORDER (curated drag-sort, like Featured Projects) ─
  - name: featured-cert-config
    label: "Featured Certificates ⭐"
    files:
      - name: featured-certificates
        label: "Featured Certificates (in display order)"
        file: content/featured-certificates.json
        description: "Pick & order the certificates shown as the main cards at the top of the Certifications page (recommended max 6). Adding a certificate here is what makes it featured — remove it here to un-feature it. Drag to reorder the cards left to right."
        fields:
          - name: items
            label: "Featured Certificates (in display order)"
            label_singular: "Featured Certificate"
            widget: list
            summary: "{{fields.certificate}}"
            fields:
              - name: certificate
                label: "Certificate"
                widget: relation
                collection: certifications
                search_fields: ['title']
                display_fields: ['title']
                value_field: title
                options_length: 100
                hint: "Search for a certificate name and pick it. Drag items to reorder — this sets the left-to-right order of the featured certificate cards."

  # ── 3. GALLERY ───────────────────────────────────────────────────────────────
  - name: gallery
    label: Gallery
    files:
      - name: gallery
        label: Work In The Field Gallery
        file: content/gallery.json
        fields:
          - name: header
            label: Header
            widget: object
            fields:
              - name: label
                label: Label
                widget: string
                hint: "Small label above the title. Example: OUR GALLERY"
              - name: title
                label: Title
                widget: string
                hint: "Main heading of the gallery section. Example: Work In The Field"
              - name: description
                label: Description
                widget: text
                hint: "A short descriptive sentence below the gallery title."
          - name: facebookUrl
            label: Facebook URL
            widget: string
            hint: "Full URL of the FDZ Engineering Facebook page for the 'See More' button. Example: https://www.facebook.com/fdzengineering"
          - name: items
            label: Gallery Items
            widget: list
            fields:
              - name: id
                label: ID
                widget: string
                hint: "A unique ID for each image. Use a short format without spaces. Example: gallery-001, site-kuching-01"
              - name: src
                label: Image
                widget: image
                media_library:
                  config:
                    max_file_size: 5242880
                hint: "Upload a work-in-the-field image. Format: JPG/PNG. Maximum size 5MB. (Image description for Google/SEO is generated automatically.)"
