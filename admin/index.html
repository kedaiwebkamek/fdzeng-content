<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FDZ Engineering — CMS Admin</title>
  <link rel="cms-config-url" href="/admin/config.yml">
  <!-- Leaflet for the map-based coordinate picker widget -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <script>
    window.addEventListener('load', function () {
      var h   = window.h;
      var CMS = window.CMS;
      if (!h || !CMS) return;

      // ── Sample fallback data ────────────────────────────────────────────────
      var PROJECT_SAMPLE = {
        status: 'Ongoing',
        year: '2026',
        date: '29 Jan 2019',
        amount: '2500000',
        client: 'Jabatan Kerja Raya Sarawak',
        description: 'Cadangan Pembinaan Jalan Penghubung',
        category: 'Infrastruktur Jalan Raya',
        cat: 'Infrastructure',
        division: 'Kuching',
        loc: 'Kuching, Sarawak',
        coordinates: '1.5556, 110.3397',
        accuracy: '',
        isPilihan: true,
        paragraph: 'Projek ini melibatkan pembinaan jalan penghubung sepanjang 2.5km di kawasan pinggir bandar Kuching.',
        images: [{ src: 'https://placehold.co/600x400?text=Gambar+Projek', alt: 'Gambar projek sample' }],
        newsList: [{ title: 'Majlis Penyerahan Projek', link: 'https://example.com' }],
        videoList: [{ title: 'Video Kemajuan Projek', link: 'https://youtube.com' }]
      };

      var CERT_SAMPLE = {
        num: '01',
        title: 'CIDB G7 — Gred Tertinggi Pembinaan',
        issuer: 'Lembaga Pembangunan Industri Pembinaan Malaysia',
        brief: 'Sijil pendaftaran kontraktor CIDB di bawah Akta CIDB 1994. Gred G7 (tertinggi) membolehkan FDZ Engineering menender projek pembinaan tanpa had nilai kontrak.',
        category: 'contractor',
        tags: ['G7', 'CIDB', 'Bumiputera'],
        status: 'Aktif',
        isFeatured: true,
        featuredOrder: 1,
        featuredTitle: '',
        featuredIssuer: '',
        logoImage: 'https://placehold.co/120x80?text=Logo+Sijil',
        iconName: 'verified',
        iconColor: 'red',
        downloadFile: '',
        validUntil: '2029-09-16',
        meta: [
          { label: 'No. Pendaftaran', value: '0120110824-SR135974' },
          { label: 'Gred', value: 'G7/B, G7/CE, G7/ME' }
        ]
      };

      // ── Extract first image src from Immutable List or plain JS array ──────────
      function getFirstImgSrc(imagesVal) {
        if (!imagesVal) return '';
        var first = imagesVal.getIn ? imagesVal.getIn([0]) : imagesVal[0];
        if (!first) return '';
        if (typeof first === 'string') return first;
        if (first.get) return first.get('src') || '';
        return first.src || '';
      }

      // ── Convert Immutable List or plain array → plain JS array ───────────────
      function toArray(val) {
        if (!val) return [];
        if (val.toJS) return val.toJS();
        return Array.isArray(val) ? val : [];
      }

      // ── brief → info (ⓘ) icon next to the title; native hover shows the text ──
      function briefHint(brief) {
        if (!brief) return '';
        var plain = String(brief).replace(/<[^>]+>/g, '').replace(/"/g, '&quot;');
        return '<span class="cert-hint-ico" title="' + plain + '"><span class="material-symbols-outlined">info</span></span>';
      }

      // ── ISO date (2027-08-22) → "22 Aug 2027" for the derived expiry row ─────
      function fmtValidUntil(iso) {
        var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
        if (!m) return iso || '';
        var mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m[2], 10) - 1] || '';
        return m[3] + ' ' + mon + ' ' + m[1];
      }

      var CERT_EXPIRY_RE = /valid until|sah sehingga|tempoh sah laku|habis tempoh|tarikh luput/i;

      // ── meta [{label,value}] (+ validUntil) → the label/value detail table ────
      // Mirrors certificates.html: appends a derived "Valid until" row from
      // validUntil when the cert doesn't already list a validity period.
      function buildMetaTable(meta, validUntil) {
        meta = meta || [];
        var hasExpiry = meta.some(function (m) { return m && CERT_EXPIRY_RE.test(m.label || ''); });
        var rows = meta.map(function (m) {
          if (!m) return '';
          var label = typeof m === 'string' ? m : (m.label || '');
          var value = typeof m === 'string' ? '' : (m.value || '');
          return '<div class="cert-meta-row"><span class="cert-meta-label">' + label + '</span><span class="cert-meta-value">' + value + '</span></div>';
        }).join('');
        if (!hasExpiry && validUntil) {
          rows += '<div class="cert-meta-row"><span class="cert-meta-label">Valid until</span><span class="cert-meta-value">' + fmtValidUntil(validUntil) + '</span></div>';
        }
        return rows ? '<div class="cert-meta-table">' + rows + '</div>' : '';
      }

      // ── Format raw number string → "RM X,XXX,XXX" (handles both old and new format) ──
      function formatAmount(val) {
        if (!val) return '—';
        var s = val.toString().trim();
        if (s.toUpperCase().startsWith('RM')) return s;
        var digits = s.replace(/[^0-9]/g, '');
        if (!digits) return s;
        return 'RM ' + digits.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      }

      // ── Widget 1: Currency MYR ─────────────────────────────────────────────────
      // Normalize any stored amount to raw whole-ringgit digits. Accepts raw
      // digits ("710000") AND legacy pre-formatted values ("RM 710,000.00").
      function currencyToRaw(v) {
        var s = String(v == null ? '' : v).replace(/[^0-9.]/g, '');
        if (s.indexOf('.') !== -1) s = s.split('.')[0]; // drop cents
        s = s.replace(/^0+(?=\d)/, '');                 // strip leading zeros
        return s;
      }
      function currencyCommas(raw) {
        if (!raw) return '';
        return raw.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      }

      function CurrencyMYRControl(props) {
        function handleChange(e) {
          props.onChange(currencyToRaw(e.target.value));
        }
        return h('div', {
          style: { display: 'flex', alignItems: 'center', borderRadius: '4px', overflow: 'hidden', border: '1px solid #ddd', background: '#fff', height: '40px' }
        },
          h('span', {
            style: { padding: '0 12px', background: '#f0f0f2', borderRight: '1px solid #ddd', fontWeight: '700', color: '#555', fontSize: '0.85rem', display: 'flex', alignItems: 'center', height: '100%', userSelect: 'none', flexShrink: '0' }
          }, 'RM'),
          h('input', {
            type: 'text',
            id: props.forID,
            value: currencyCommas(currencyToRaw(props.value)),
            placeholder: 'Contoh: 2500000',
            onChange: handleChange,
            style: { border: 'none', outline: 'none', padding: '0 12px', flex: 1, fontSize: '0.9rem', fontFamily: 'inherit', height: '100%', background: 'transparent' }
          })
        );
      }

      function CurrencyMYRPreview(props) {
        var raw = currencyToRaw(props.value);
        if (!raw) return h('span', {}, '—');
        return h('span', {}, 'RM ' + currencyCommas(raw));
      }

      CMS.registerWidget('currency-myr', CurrencyMYRControl, CurrencyMYRPreview);

      // ── Widget 2: Conditional Year & Date ─────────────────────────────────────
      function getEntryStatus(props) {
        // Read the live select value first — props.entry reflects the last-saved
        // state and will be stale when the user changes status without saving.
        try {
          var selects = document.querySelectorAll('select');
          for (var i = 0; i < selects.length; i++) {
            var opts = selects[i].options;
            for (var j = 0; j < opts.length; j++) {
              if (opts[j].value === 'Ongoing') return selects[i].value;
            }
          }
        } catch(e) {}
        try {
          var entry = props.entry;
          if (entry && entry.getIn) return entry.getIn(['data', 'status']) || '';
        } catch(e) {}
        return '';
      }

      var conditionalBannerStyle = {
        display: 'flex', alignItems: 'center', gap: '8px',
        padding: '8px 12px', background: '#fef9c3', border: '1px solid #fde047',
        borderRadius: '4px', fontSize: '0.78rem', color: '#713f12', marginBottom: '6px'
      };

      function conditionalInput(props, placeholder) {
        return h('input', {
          type: 'text',
          id: props.forID,
          value: props.value || '',
          placeholder: placeholder,
          onChange: function(e) { props.onChange(e.target.value); },
          style: {
            width: '100%', padding: '8px 12px',
            border: '1px solid #ddd', borderRadius: '4px',
            fontSize: '0.9rem', fontFamily: 'inherit'
          }
        });
      }

      function conditionalBanner() {
        return h('div', { style: conditionalBannerStyle },
          h('span', { style: { fontWeight: '700', flexShrink: '0' } }, '!'),
          'Projek masih berjalan — tarikh siap belum ditetapkan'
        );
      }

      function YearConditionalControl(props) {
        var isOngoing = getEntryStatus(props) === 'Ongoing';
        return h('div', {},
          isOngoing ? conditionalBanner() : null,
          conditionalInput(props, 'Contoh: 2024')
        );
      }

      CMS.registerWidget('year-conditional', YearConditionalControl);

      // Convert between the stored "DD MMM YYYY" (English) string and ISO for the
      // native calendar picker. "Ongoing" (and anything unparseable) yields ''.
      var FDZ_MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      function fdzDateToISO(v) {
        var m = /(\d{1,2})\s+([A-Za-z]{3})[A-Za-z]*\s+(\d{4})/.exec(v || '');
        if (!m) return '';
        var mi = FDZ_MON.indexOf(m[2].slice(0, 3));
        if (mi < 0) return '';
        return m[3] + '-' + String(mi + 1).padStart(2, '0') + '-' + String(parseInt(m[1], 10)).padStart(2, '0');
      }
      function fdzISOToDate(iso) {
        var m = /(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
        if (!m) return '';
        return String(parseInt(m[3], 10)).padStart(2, '0') + ' ' + FDZ_MON[parseInt(m[2], 10) - 1] + ' ' + m[1];
      }

      function DateConditionalControl(props) {
        var isOngoing = getEntryStatus(props) === 'Ongoing';
        var picker = h('input', {
          type: 'date',
          value: fdzDateToISO(props.value),
          title: 'Pilih tarikh dari kalendar',
          onChange: function (e) { var s = fdzISOToDate(e.target.value); if (s) props.onChange(s); },
          style: { padding: '7px 10px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '0.9rem', fontFamily: 'inherit', flexShrink: '0', height: '38px' }
        });
        var text = h('input', {
          type: 'text', id: props.forID, value: props.value || '',
          placeholder: 'Contoh: 29 Jan 2019',
          onChange: function (e) { props.onChange(e.target.value); },
          style: { flex: '1', minWidth: '130px', padding: '8px 12px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '0.9rem', fontFamily: 'inherit', height: '38px' }
        });
        return h('div', {},
          isOngoing ? conditionalBanner() : null,
          h('div', { style: { display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' } }, picker, text),
          h('p', { style: { fontSize: '0.72rem', color: '#5f5e5e', marginTop: '5px', lineHeight: '1.5' } },
            'Pilih tarikh dari kalendar (kiri) — ia diisi automatik dalam format "29 Jan 2019". Atau taip terus di kotak kanan.')
        );
      }

      CMS.registerWidget('date-conditional', DateConditionalControl);

      // ── Widget: Map coordinate picker ─────────────────────────────────────────
      // Click the map (or drag the pin) to set a project's GPS. Stores the same
      // "lat, lng" string the coordinates field has always used. Uses Leaflet
      // (loaded in <head>). Sarawak-centred default.
      function parseLatLng(v) {
        var m = /(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)/.exec(v || '');
        return m ? [parseFloat(m[1]), parseFloat(m[2])] : null;
      }
      function CoordinateMapControl(props) {
        function initMap(el) {
          if (!el || el._fdzMap) return;
          if (typeof L === 'undefined') { setTimeout(function () { initMap(el); }, 300); return; }
          var here = parseLatLng(props.value);
          var map = L.map(el).setView(here || [2.9, 112.6], here ? 14 : 7);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
          }).addTo(map);
          el._fdzMap = map;
          el._fdzMarker = null;
          function place(latlng) {
            var s = latlng.lat.toFixed(6) + ', ' + latlng.lng.toFixed(6);
            props.onChange(s);
            if (el._fdzMarker) { el._fdzMarker.setLatLng(latlng); }
            else {
              el._fdzMarker = L.marker(latlng, { draggable: true }).addTo(map);
              el._fdzMarker.on('dragend', function (e) { place(e.target.getLatLng()); });
            }
          }
          if (here) place({ lat: here[0], lng: here[1] });
          map.on('click', function (e) { place(e.latlng); });
          setTimeout(function () { map.invalidateSize(); }, 250);
        }
        return h('div', {},
          h('input', {
            type: 'text', id: props.forID, value: props.value || '',
            placeholder: 'Contoh: 1.551230, 110.372326',
            onChange: function (e) { props.onChange(e.target.value); },
            style: { width: '100%', padding: '8px 12px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '0.9rem', fontFamily: 'inherit', marginBottom: '8px' }
          }),
          h('div', {
            ref: initMap,
            style: { height: '320px', width: '100%', borderRadius: '6px', overflow: 'hidden', border: '1px solid #ddd', zIndex: 0 }
          }),
          h('p', {
            style: { fontSize: '0.72rem', color: '#5f5e5e', marginTop: '6px', lineHeight: '1.5' }
          }, 'Klik pada peta untuk letak penanda lokasi projek, atau seret penanda untuk laraskan. Koordinat akan diisi automatik di atas. (Menaip manual tidak menggerakkan penanda — gunakan peta untuk ketepatan.)')
        );
      }
      function CoordinateMapPreview(props) {
        return h('span', {}, props.value || '—');
      }
      CMS.registerWidget('coordinate-map', CoordinateMapControl, CoordinateMapPreview);

      // ── Shared card/item builders (accept plain JS field objects) ────────────

      // Category → display label + icon, matching the live projects page
      var CAT_BM = {
        'Building': 'Building & Facilities',
        'Infrastructure': 'Infrastructure',
        'Maintenance': 'Maintenance',
        'Telecom': 'Telecom',
        'Utilities': 'Utilities'
      };
      var CAT_ICON = {
        'Building': 'apartment',
        'Infrastructure': 'road',
        'Maintenance': 'construction',
        'Telecom': 'cell_tower',
        'Utilities': 'water_pump'
      };

      function buildProjectCard(d) {
        var isOngoing  = d.status === 'Ongoing';
        var badgeClass = isOngoing ? ' dyn-card__badge-status--active' : '';
        var statusHtml = isOngoing ? '<span class="dyn-ping"></span>Ongoing' : 'Completed';
        var dateBadge = (!isOngoing && d.date)
          ? '<span class="dyn-card__meta-year">' + d.date + '</span>'
          : '<span></span>';
        var catLabel = CAT_BM[d.cat] || d.cat || '';
        var clientHtml = isOngoing
          ? '<p class="dyn-card__client">Client: <span class="dyn-card__client-name">' + (d.client || '—') + '</span></p>'
          : '';
        var newsChip = (d.newsListLen > 0)
          ? '<span class="dyn-chip dyn-chip--news"><span class="material-symbols-outlined" style="font-size:13px;">link</span>' + d.newsListLen + ' Related Link' + (d.newsListLen === 1 ? '' : 's') + '</span>'
          : '';
        var videoChip = (d.videoListLen > 0)
          ? '<span class="dyn-chip dyn-chip--video"><span class="material-symbols-outlined" style="font-size:13px;">play_circle</span>' + d.videoListLen + ' Video</span>'
          : '';
        var imgHtml = (d.imgSrc && d.imgSrc !== '')
          ? '<img class="dyn-card__img" src="' + d.imgSrc + '" alt="Project">'
          : '<div class="dyn-card__no-img"><span class="material-symbols-outlined">' + (CAT_ICON[d.cat] || 'folder_open') + '</span></div>';
        return [
          '<div class="dyn-card">',
          '  <div class="dyn-card__img-wrap">',
          '    ' + imgHtml,
          '    <span class="dyn-card__badge-status' + badgeClass + '">' + statusHtml + '</span>',
          '    <img src="/fdzeng-logo.png" class="dyn-card__brand-watermark" alt="">',
          '  </div>',
          '  <div class="dyn-card__body">',
          '    <div class="dyn-card__meta">',
          '      ' + dateBadge,
          '      <span class="dyn-card__meta-cat">' + catLabel + '</span>',
          '    </div>',
          '    <h3 class="dyn-card__title" style="margin-bottom:' + (isOngoing ? '0' : 'auto') + '">' + (d.description || '') + '</h3>',
          '    ' + clientHtml,
          '    <div class="dyn-card__footer">',
          '      <div class="dyn-card__val-block">',
          '        <p class="dyn-card__val-title">Project Value</p>',
          '        <p class="dyn-card__val-amt">' + formatAmount(d.amount) + '</p>',
          '      </div>',
          '      ' + newsChip,
          '      ' + videoChip,
          '    </div>',
          '  </div>',
          '</div>'
        ].join('\n');
      }

      // Category badge colours — same palette as the live map popup.
      var CAT_COLORS_ADMIN = {
        Infrastructure: { bg: 'rgba(59,130,246,0.18)',  border: 'rgba(59,130,246,0.45)', text: '#93c5fd' },
        Telecom:        { bg: 'rgba(236,72,153,0.18)',  border: 'rgba(236,72,153,0.45)', text: '#f9a8d4' },
        Utilities:      { bg: 'rgba(14,165,233,0.18)',  border: 'rgba(14,165,233,0.45)', text: '#7dd3fc' },
        Maintenance:    { bg: 'rgba(245,158,11,0.18)',  border: 'rgba(245,158,11,0.45)', text: '#fcd34d' },
        Building:       { bg: 'rgba(139,92,246,0.18)',  border: 'rgba(139,92,246,0.45)', text: '#c4b5fd' }
      };

      // The dark popup card a visitor sees when they tap a project pin on the map.
      function buildPinPopup(d) {
        var isO = d.status === 'Ongoing';
        var c = CAT_COLORS_ADMIN[d.cat] || CAT_COLORS_ADMIN.Building;
        var dateVal = isO ? '—' : (d.date || '—');
        return [
          '<div class="pm-pop">',
          '  <div class="pm-pop-type ' + (isO ? 'pm-pop-type--o' : 'pm-pop-type--c') + '">' + (isO ? '● Ongoing' : '● Completed') + '</div>',
          '  <div class="pm-pop-name">' + (d.description || '—') + '</div>',
          '  <div class="pm-pop-meta">',
          '    <div class="pm-pop-row"><span class="pm-pop-row-label">Date</span><span>' + dateVal + '</span></div>',
          '    <div class="pm-pop-row"><span class="pm-pop-row-label">Loc</span><span>' + (d.loc || '—') + '</span></div>',
          (d.client ? '    <div class="pm-pop-row"><span class="pm-pop-row-label">Client</span><span>' + d.client + '</span></div>' : ''),
          '    <div class="pm-pop-row"><span class="pm-pop-row-label">Value</span><span class="pm-pop-val-highlight">' + formatAmount(d.amount) + '</span></div>',
          '    <div class="pm-pop-row"><span class="pm-pop-row-label">Cat</span><span class="pm-pop-cat" style="background:' + c.bg + ';color:' + c.text + ';border:1px solid ' + c.border + ';">' + (d.cat || '—') + '</span></div>',
          (d.accuracy ? '    <div class="pm-pop-row pm-pop-acc">' + d.accuracy + '</div>' : ''),
          '  </div>',
          '</div>'
        ].join('\n');
      }

      // Small static map (3×3 OSM tile block + pin) for context, then the pin
      // popup card so the editor sees exactly what a visitor sees on tap.
      function buildProjectMap(d) {
        var parts = String(d.coordinates || '').split(',');
        var lat = parseFloat(parts[0]), lng = parseFloat(parts[1]);
        var cap = '<p class="pv-pin-cap">&#9660; Info bila pin ditekan di peta laman web</p>';
        var popup = buildPinPopup(d);
        if (!isFinite(lat) || !isFinite(lng)) {
          return '<div class="pv-map pv-map--empty">Tiada koordinat lagi — klik pada peta di medan "Koordinat GPS"</div>' + cap + popup;
        }
        var z = 14;
        var txF = (lng + 180) / 360 * Math.pow(2, z);
        var latR = lat * Math.PI / 180;
        var tyF = (1 - Math.log(Math.tan(latR) + 1 / Math.cos(latR)) / Math.PI) / 2 * Math.pow(2, z);
        var cx = Math.floor(txF), cy = Math.floor(tyF);
        var pinX = ((txF - (cx - 1)) / 3 * 100).toFixed(2);
        var pinY = ((tyF - (cy - 1)) / 3 * 100).toFixed(2);
        var tiles = '';
        for (var ty = cy - 1; ty <= cy + 1; ty++) {
          for (var tx = cx - 1; tx <= cx + 1; tx++) {
            tiles += '<img src="https://tile.openstreetmap.org/' + z + '/' + tx + '/' + ty + '.png" alt="" loading="lazy">';
          }
        }
        return [
          '<div class="pv-map">',
          '  <div class="pv-map__tiles">' + tiles + '</div>',
          '  <div class="pv-map__pin" style="left:' + pinX + '%;top:' + pinY + '%;"><span class="material-symbols-outlined">location_on</span></div>',
          '</div>',
          '<div class="pv-map-coord">' + d.coordinates + '</div>',
          cap,
          popup
        ].join('\n');
      }

      function buildProjectTableRow(d) {
        var isOngoing   = d.status === 'Ongoing';
        var dotClass    = isOngoing ? 'pf-table__dot--active' : 'pf-table__dot--done';
        var badgeClass  = isOngoing ? 'pf-table__badge--active' : 'pf-table__badge--done';
        var statusLabel = isOngoing ? 'Ongoing' : 'Completed';
        var yr = isOngoing ? '—' : ((/(?:19|20)\d{2}/.exec(String(d.date || '')) || [])[0] || d.date || '—');
        var thumb = (d.imgSrc && d.imgSrc !== '')
          ? '<img src="' + d.imgSrc + '" alt="">'
          : '<span class="material-symbols-outlined">' + (CAT_ICON[d.cat] || 'folder_open') + '</span>';
        return [
          '<div class="pf-table-wrap">',
          '  <table class="pf-table">',
          '    <thead><tr>',
          '      <th class="pf-col-num">#</th>',
          '      <th>Status</th>',
          '      <th>Year</th>',
          '      <th>Project &amp; Client</th>',
          '      <th>Category</th>',
          '      <th>Division</th>',
          '      <th>Project Value</th>',
          '    </tr></thead>',
          '    <tbody><tr>',
          '      <td class="pf-col-num">1</td>',

  <script>
    /* ── Conditional Year/Date field visibility ────────────────────────────────
       Watches the CMS form DOM and hides the Year and Tarikh fields (replacing
       them with an info overlay) whenever status is "Ongoing".                 */
    (function () {
      var YEAR_MSG_ID = 'fdz-cond-year-msg';
      var DATE_MSG_ID = 'fdz-cond-date-msg';

      var msgStyle = [
        'display:block',
        'background:#fff8e1',
        'border-left:4px solid #f59e0b',
        'padding:12px 16px',
        'border-radius:4px',
        'color:#92400e',
        'font-size:13px',
        'margin-top:4px'
      ].join(';');

      // Find the status <select> by locating an option with value "Ongoing"
      function findStatusSelect() {
        var selects = document.querySelectorAll('select');
        for (var i = 0; i < selects.length; i++) {
          for (var j = 0; j < selects[i].options.length; j++) {
            if (selects[i].options[j].value === 'Ongoing') return selects[i];
          }
        }
        return null;
      }

      // Walk up from a <label> to find the outermost field wrapper div:
      // the first ancestor that (a) has ≥2 children AND (b) contains a widget input.
      function findFieldWrapper(labelText) {
        var labels = document.querySelectorAll('label');
        for (var i = 0; i < labels.length; i++) {
          var lbl = labels[i];
          var txt = lbl.textContent.replace(/\s*\*\s*/g, '').replace(/\s+/g, ' ').trim();
          if (txt !== labelText) continue;
          var el = lbl;
          for (var k = 0; k < 6; k++) {
            var p = el.parentElement;
            if (!p || p === document.body) break;
            if (p.children.length >= 2 && p.querySelector('input, select, textarea')) {
              return p;
            }
            el = p;
          }
          // Fallback: 2 levels above label
          return lbl.parentElement ? lbl.parentElement.parentElement : null;
        }
        return null;
      }

      function applyVisibility(status) {
        var isOngoing = status === 'Ongoing';

        [
          { labelText: 'Tarikh Siap', msgId: DATE_MSG_ID, msg: '⏳ Projek masih berjalan — Tarikh siap belum ditetapkan' }
        ].forEach(function (item) {
          // Remove any existing overlay first
          var old = document.getElementById(item.msgId);
          if (old && old.parentNode) old.parentNode.removeChild(old);

          var wrapper = findFieldWrapper(item.labelText);
          if (!wrapper) return;

          if (isOngoing) {
            wrapper.style.display = 'none';
            var div = document.createElement('div');
            div.id = item.msgId;
            div.setAttribute('style', msgStyle);
            div.textContent = item.msg;
            wrapper.parentNode.insertBefore(div, wrapper);
          } else {
            wrapper.style.display = '';
          }
        });
      }

      function setup() {
        var sel = findStatusSelect();
        if (!sel) return;

        // Attach listeners only once per element instance
        if (!sel._fdzSetup) {
          sel._fdzSetup = true;
          var handler = function () { applyVisibility(sel.value); };
          sel.addEventListener('change', handler);
          sel.addEventListener('input', handler);
        }

        // Apply immediately: handles both initial load and navigation to an
        // existing "Ongoing" entry where fields should be hidden on open
        applyVisibility(sel.value);
      }

      // Debounce mutations — React re-renders fire dozens of callbacks at once
      var debounce = null;
      var observer = new MutationObserver(function () {
        clearTimeout(debounce);
        debounce = setTimeout(setup, 200);
      });

      observer.observe(document.body, { childList: true, subtree: true, attributes: true });

      // Try immediately in case CMS already rendered before this script ran
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
      } else {
        setup();
      }
    })();
  </script>

  <script>
    /* ── Featured Order conditional visibility ─────────────────────────────────
       Hides the "Kedudukan dalam Grid" field and replaces it with an info banner
       whenever the "Papar dalam Sijil Pilihan" toggle is OFF.                  */
    (function () {
      var ORDER_MSG_ID = 'fdz-cond-order-msg';

      var msgStyle = [
        'display:block',
        'background:#f0f4ff',
        'border-left:4px solid #6366f1',
        'padding:12px 16px',
        'border-radius:4px',
        'color:#3730a3',
        'font-size:13px',
        'margin-top:4px'
      ].join(';');

      function findToggle() {
        var buttons = document.querySelectorAll('button[role="switch"]');
        for (var i = 0; i < buttons.length; i++) {
          var btn = buttons[i];
          var container = btn.parentElement;
          for (var k = 0; k < 8; k++) {
            if (!container) break;
            var labels = container.querySelectorAll('label');
            for (var j = 0; j < labels.length; j++) {
              if (labels[j].textContent.indexOf('Papar dalam Sijil Pilihan') !== -1) {
                return btn;
              }
            }
            container = container.parentElement;
          }
        }
        return null;
      }

      function findFieldWrapper(labelText) {
        var labels = document.querySelectorAll('label');
        for (var i = 0; i < labels.length; i++) {
          var lbl = labels[i];
          var txt = lbl.textContent.replace(/\s*\*\s*/g, '').replace(/\s+/g, ' ').trim();
          if (txt !== labelText) continue;
          var el = lbl;
          for (var k = 0; k < 6; k++) {
            var p = el.parentElement;
            if (!p || p === document.body) break;
            if (p.children.length >= 2 && p.querySelector('input, select, textarea')) {
              return p;
            }
            el = p;
          }
          return lbl.parentElement ? lbl.parentElement.parentElement : null;
        }
        return null;
      }

      function applyFeaturedOrderVisibility() {
        var toggle = findToggle();
        if (!toggle) return;

        var isOn = toggle.getAttribute('aria-checked') === 'true';

        var old = document.getElementById(ORDER_MSG_ID);
        if (old && old.parentNode) old.parentNode.removeChild(old);

        var wrapper = findFieldWrapper('Kedudukan dalam Grid (1–6)');
        if (!wrapper) return;

        if (isOn) {
          wrapper.style.display = '';
        } else {
          wrapper.style.display = 'none';
          var div = document.createElement('div');
          div.id = ORDER_MSG_ID;
          div.setAttribute('style', msgStyle);
          div.textContent = 'ℹ️ Aktifkan "Papar dalam Sijil Pilihan" dahulu untuk tetapkan kedudukan grid.';
          wrapper.parentNode.insertBefore(div, wrapper);
        }
      }

      var debounce = null;
      var observer = new MutationObserver(function () {
        clearTimeout(debounce);
        debounce = setTimeout(applyFeaturedOrderVisibility, 150);
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['aria-checked']
      });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyFeaturedOrderVisibility);
      } else {
        applyFeaturedOrderVisibility();
      }
    })();
  </script>
