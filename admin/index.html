<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FDZ Engineering — CMS Admin</title>
  <link rel="cms-config-url" href="/admin/config.yml">
</head>
<body>
  <script>
    window.addEventListener('load', function () {
      var h   = window.h;
      var CMS = window.CMS;
      if (!h || !CMS) return;

      // ── Sample fallback data ────────────────────────────────────────────────
      var PROJECT_SAMPLE = {
        status: 'Ongoing',
        year: '2026',
        date: '29 Jan 2019',
        amount: '2500000',
        client: 'Jabatan Kerja Raya Sarawak',
        description: 'Cadangan Pembinaan Jalan Penghubung',
        category: 'Infrastruktur Jalan Raya',
        cat: 'Infrastructure',
        division: 'Kuching',
        loc: 'Kuching, Sarawak',
        isPilihan: true,
        paragraph: 'Projek ini melibatkan pembinaan jalan penghubung sepanjang 2.5km di kawasan pinggir bandar Kuching.',
        images: [{ src: 'https://placehold.co/600x400?text=Gambar+Projek', alt: 'Gambar projek sample' }],
        newsList: [{ title: 'Majlis Penyerahan Projek', link: 'https://example.com' }],
        videoList: [{ title: 'Video Kemajuan Projek', link: 'https://youtube.com' }]
      };

      var CERT_SAMPLE = {
        num: '01',
        title: 'CIDB G7 — Gred Tertinggi Pembinaan',
        issuer: 'Lembaga Pembangunan Industri Pembinaan Malaysia',
        brief: 'Sijil pendaftaran kontraktor CIDB di bawah Akta CIDB 1994. Gred G7 (tertinggi) membolehkan FDZ Engineering menender projek pembinaan tanpa had nilai kontrak.',
        category: 'contractor',
        tags: ['G7', 'CIDB', 'Bumiputera'],
        status: 'Aktif',
        isFeatured: true,
        featuredOrder: 1,
        featuredTitle: '',
        featuredIssuer: '',
        logoImage: 'https://placehold.co/120x80?text=Logo+Sijil',
        iconName: 'verified',
        iconColor: 'red',
        downloadFile: '',
        meta: [
          { label: 'No. Pendaftaran', value: '0120110824-SR135974' },
          { label: 'Gred', value: 'G7/B, G7/CE, G7/ME' },
          { label: 'Sah sehingga', value: '16 Sep 2029' }
        ]
      };

      // ── Extract first image src from Immutable List or plain JS array ──────────
      function getFirstImgSrc(imagesVal) {
        if (!imagesVal) return '';
        var first = imagesVal.getIn ? imagesVal.getIn([0]) : imagesVal[0];
        if (!first) return '';
        if (typeof first === 'string') return first;
        if (first.get) return first.get('src') || '';
        return first.src || '';
      }

      // ── Convert Immutable List or plain array → plain JS array ───────────────
      function toArray(val) {
        if (!val) return [];
        if (val.toJS) return val.toJS();
        return Array.isArray(val) ? val : [];
      }

      // ── brief → info (ⓘ) icon next to the title; native hover shows the text ──
      function briefHint(brief) {
        if (!brief) return '';
        var plain = String(brief).replace(/<[^>]+>/g, '').replace(/"/g, '&quot;');
        return '<span class="cert-hint-ico" title="' + plain + '"><span class="material-symbols-outlined">info</span></span>';
      }

      // ── meta [{label,value}] → the label/value detail table (list view) ──────
      function buildMetaTable(meta) {
        if (!meta || !meta.length) return '';
        var rows = meta.map(function (m) {
          if (!m) return '';
          var label = typeof m === 'string' ? m : (m.label || '');
          var value = typeof m === 'string' ? '' : (m.value || '');
          return '<div class="cert-meta-row"><span class="cert-meta-label">' + label + '</span><span class="cert-meta-value">' + value + '</span></div>';
        }).join('');
        return '<div class="cert-meta-table">' + rows + '</div>';
      }

      // ── Format raw number string → "RM X,XXX,XXX" (handles both old and new format) ──
      function formatAmount(val) {
        if (!val) return '—';
        var s = val.toString().trim();
        if (s.toUpperCase().startsWith('RM')) return s;
        var digits = s.replace(/[^0-9]/g, '');
        if (!digits) return s;
        return 'RM ' + digits.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      }

      // ── Widget 1: Currency MYR ─────────────────────────────────────────────────
      function CurrencyMYRControl(props) {
        function formatCommas(raw) {
          if (!raw) return '';
          return raw.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
        function handleChange(e) {
          var raw = e.target.value.replace(/[^0-9]/g, '');
          props.onChange(raw);
        }
        return h('div', {
          style: { display: 'flex', alignItems: 'center', borderRadius: '4px', overflow: 'hidden', border: '1px solid #ddd', background: '#fff', height: '40px' }
        },
          h('span', {
            style: { padding: '0 12px', background: '#f0f0f2', borderRight: '1px solid #ddd', fontWeight: '700', color: '#555', fontSize: '0.85rem', display: 'flex', alignItems: 'center', height: '100%', userSelect: 'none', flexShrink: '0' }
          }, 'RM'),
          h('input', {
            type: 'text',
            id: props.forID,
            value: formatCommas(props.value || ''),
            placeholder: 'Contoh: 2500000',
            onChange: handleChange,
            style: { border: 'none', outline: 'none', padding: '0 12px', flex: 1, fontSize: '0.9rem', fontFamily: 'inherit', height: '100%', background: 'transparent' }
          })
        );
      }

      function CurrencyMYRPreview(props) {
        var raw = props.value || '';
        if (!raw) return h('span', {}, '—');
        return h('span', {}, 'RM ' + raw.replace(/\B(?=(\d{3})+(?!\d))/g, ','));
      }

      CMS.registerWidget('currency-myr', CurrencyMYRControl, CurrencyMYRPreview);

      // ── Widget 2: Conditional Year & Date ─────────────────────────────────────
      function getEntryStatus(props) {
        // Read the live select value first — props.entry reflects the last-saved
        // state and will be stale when the user changes status without saving.
        try {
          var selects = document.querySelectorAll('select');
          for (var i = 0; i < selects.length; i++) {
            var opts = selects[i].options;
            for (var j = 0; j < opts.length; j++) {
              if (opts[j].value === 'Ongoing') return selects[i].value;
            }
          }
        } catch(e) {}
        try {
          var entry = props.entry;
          if (entry && entry.getIn) return entry.getIn(['data', 'status']) || '';
        } catch(e) {}
        return '';
      }

      var conditionalBannerStyle = {
        display: 'flex', alignItems: 'center', gap: '8px',
        padding: '8px 12px', background: '#fef9c3', border: '1px solid #fde047',
        borderRadius: '4px', fontSize: '0.78rem', color: '#713f12', marginBottom: '6px'
      };

      function conditionalInput(props, placeholder) {
        return h('input', {
          type: 'text',
          id: props.forID,
          value: props.value || '',
          placeholder: placeholder,
          onChange: function(e) { props.onChange(e.target.value); },
          style: {
            width: '100%', padding: '8px 12px',
            border: '1px solid #ddd', borderRadius: '4px',
            fontSize: '0.9rem', fontFamily: 'inherit'
          }
        });
      }

      function conditionalBanner() {
        return h('div', { style: conditionalBannerStyle },
          h('span', { style: { fontWeight: '700', flexShrink: '0' } }, '!'),
          'Projek masih berjalan — tarikh siap belum ditetapkan'
        );
      }

      function YearConditionalControl(props) {
        var isOngoing = getEntryStatus(props) === 'Ongoing';
        return h('div', {},
          isOngoing ? conditionalBanner() : null,
          conditionalInput(props, 'Contoh: 2024')
        );
      }

      CMS.registerWidget('year-conditional', YearConditionalControl);

      function DateConditionalControl(props) {
        var isOngoing = getEntryStatus(props) === 'Ongoing';
        return h('div', {},
          isOngoing ? conditionalBanner() : null,
          conditionalInput(props, 'Contoh: 29 Jan 2019')
        );
      }

      CMS.registerWidget('date-conditional', DateConditionalControl);

      // ── Shared card/item builders (accept plain JS field objects) ────────────

      function buildProjectCard(d) {
        var isOngoing   = d.status === 'Ongoing';
        var statusLabel = isOngoing
          ? '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#28c840;margin-right:4px;flex-shrink:0;"></span>' + (d.status || '')
          : (d.status || '—');
        var dateBadge = (!isOngoing && d.date)
          ? '<span class="dyn-card__meta-year">' + d.date + '</span>'
          : '<span></span>';
        var clientHtml = isOngoing
          ? '<p class="dyn-card__client">Klien: <span class="dyn-card__client-name">' + (d.client || '—') + '</span></p>'
          : '';
        var newsChip = (d.newsListLen > 0)
          ? '<span class="news-chip"><span class="material-symbols-outlined" style="font-size:13px;">link</span>' + d.newsListLen + ' Pautan Berkaitan</span>'
          : '';
        var videoChip = (d.videoListLen > 0)
          ? '<span class="video-chip"><span class="material-symbols-outlined" style="font-size:13px;">play_circle</span>' + d.videoListLen + ' Video</span>'
          : '';
        var imgHtml = (d.imgSrc && d.imgSrc !== '')
          ? '<img class="dyn-card__img" src="' + d.imgSrc + '" alt="Gambar projek">'
          : '<div class="dyn-card__img-placeholder">Tiada Gambar</div>';
        return [
          '<div class="dyn-card">',
          '  <div class="dyn-card__img-wrap">',
          '    ' + imgHtml,
          '    <span class="dyn-card__badge-status' + (isOngoing ? ' dyn-card__badge-status--active' : '') + '">' + statusLabel + '</span>',
          (d.isPilihan ? '    <span class="dyn-card__badge-pilihan">&#x2B50; Pilihan</span>' : ''),
          '  </div>',
          '  <div class="dyn-card__body">',
          '    <div class="dyn-card__meta">',
          '      ' + dateBadge,
          '      <div><span class="dyn-card__meta-cat">' + (d.cat || d.category || '') + '</span></div>',
          '    </div>',
          '    <h3 class="dyn-card__title">' + (d.description || '') + '</h3>',
          '    ' + clientHtml,
          '    <div class="dyn-card__footer" style="margin-top:' + (isOngoing ? '0' : 'auto') + '">',
          '      <div class="dyn-card__val-block">',
          '        <p class="dyn-card__val-title">Nilai Projek</p>',
          '        <p class="dyn-card__val-amt">' + formatAmount(d.amount) + '</p>',
          '      </div>',
          '      ' + newsChip,
          '      ' + videoChip,
          '    </div>',
          '  </div>',
          '</div>'
        ].join('\n');
      }

      function buildProjectTableRow(d) {
        var isOngoing = d.status === 'Ongoing';
        var statusHtml = isOngoing
          ? '<span style="display:inline-flex;align-items:center;gap:4px;color:#16a34a;font-weight:600;font-size:0.7rem"><span style="width:7px;height:7px;border-radius:50%;background:#16a34a;display:inline-block;"></span>Berjalan</span>'
          : '<span style="color:#6b7280;font-size:0.7rem;font-weight:600;">Siap</span>';
        return [
          '<div style="overflow-x:auto;width:100%;">',
          '<table style="width:100%;border-collapse:collapse;font-size:0.72rem;font-family:Inter,sans-serif;">',
          '  <thead>',
          '    <tr style="background:#f3f4f6;border-bottom:2px solid #e5e7eb;">',
          '      <th style="padding:8px 10px;text-align:left;font-weight:700;color:#374151;">Penerangan</th>',
          '      <th style="padding:8px 10px;text-align:left;font-weight:700;color:#374151;white-space:nowrap;">Lokasi</th>',
          '      <th style="padding:8px 10px;text-align:left;font-weight:700;color:#374151;white-space:nowrap;">Klien</th>',
          '      <th style="padding:8px 10px;text-align:left;font-weight:700;color:#374151;white-space:nowrap;">Tarikh</th>',
          '      <th style="padding:8px 10px;text-align:left;font-weight:700;color:#374151;white-space:nowrap;">Kategori</th>',
          '      <th style="padding:8px 10px;text-align:left;font-weight:700;color:#374151;white-space:nowrap;">Nilai</th>',
          '      <th style="padding:8px 10px;text-align:left;font-weight:700;color:#374151;white-space:nowrap;">Status</th>',
          '    </tr>',
          '  </thead>',
          '  <tbody>',
          '    <tr style="border-bottom:1px solid #e5e7eb;background:#fff;">',
          '      <td style="padding:8px 10px;color:#111827;font-weight:600;max-width:200px;">' + (d.description || '—') + '</td>',
          '      <td style="padding:8px 10px;color:#374151;white-space:nowrap;">' + (d.loc || '—') + '</td>',
          '      <td style="padding:8px 10px;color:#374151;white-space:nowrap;">' + (d.client || '—') + '</td>',
          '      <td style="padding:8px 10px;color:#374151;white-space:nowrap;">' + (d.date || '—') + '</td>',
          '      <td style="padding:8px 10px;color:#374151;white-space:nowrap;">' + (d.category || '—') + '</td>',
          '      <td style="padding:8px 10px;color:#374151;white-space:nowrap;font-weight:600;">' + formatAmount(d.amount) + '</td>',
          '      <td style="padding:8px 10px;">' + statusHtml + '</td>',
          '    </tr>',
          '  </tbody>',
          '</table>',
          '</div>'
        ].join('\n');
      }

      function buildCertCard(d) {
        var statusMod = d.status === 'Tamat' ? ' cert-card__status-value--tamat'
                      : d.status === 'Dalam Pembaharuan' ? ' cert-card__status-value--renewal'
                      : '';
        var iconHtml = (d.logoSrc && d.logoSrc !== '')
          ? '<img src="' + d.logoSrc + '" class="cert-card__icon-img" alt="' + (d.title || '') + '">'
          : (d.iconName
              ? '<span class="material-symbols-outlined">' + d.iconName + '</span>'
              : '<div style="font-size:0.5rem;font-weight:700;color:#9ca3af;text-align:center;line-height:1.3;text-transform:uppercase;">Tiada<br>Logo</div>');
        var displayTitle  = d.featuredTitle  || d.title  || '—';
        var displayIssuer = d.featuredIssuer || d.issuer || '—';
        return [
          '<div class="certs-grid">',
          '  <article class="cert-card">',
          '    <div class="cert-card__icon">' + iconHtml + '</div>',
          '    <h3 class="cert-card__title">' + displayTitle + briefHint(d.brief) + '</h3>',
          '    <p class="cert-card__issuer">' + displayIssuer + '</p>',
          '    <div class="cert-card__footer">',
          '      <span class="cert-card__status-value' + statusMod + '">' + (d.status || '—') + '</span>',
          '      <button class="cert-card__download-btn"><span class="material-symbols-outlined" style="font-size:1.2rem;color:#b5000b;">download</span></button>',
          '    </div>',
          '  </article>',
          '</div>'
        ].join('\n');
      }

      function buildCertListItem(d) {
        var statusClass = d.status === 'Aktif' ? 'cert-status--active'
                        : d.status === 'Tamat' ? 'cert-status--tamat'
                        : 'cert-status--renewal';
        var iconHtml = (d.logoSrc && d.logoSrc !== '')
          ? '<img src="' + d.logoSrc + '" style="height:28px;width:auto;object-fit:contain;" alt="' + (d.title || '') + '">'
          : '<span class="material-symbols-outlined">' + (d.iconName || 'workspace_premium') + '</span>';
        return [
          '<div class="cert-list">',
          '  <div class="cert-list-item">',
          '    <div class="cert-list-item__left">',
          '      <div class="cert-list-item__icon cert-list-item__icon--' + (d.iconColor || 'grey') + '">' + iconHtml + '</div>',
          '      <div class="cert-list-item__info">',
          '        <h3 class="cert-list-item__title">' + (d.title || '—') + briefHint(d.brief) + '</h3>',
          '        <p class="cert-list-item__meta">' + (d.issuer || '—') + '</p>',
          buildMetaTable(d.meta),
          '      </div>',
          '    </div>',
          '    <div class="cert-list-item__right">',
          '      <span class="cert-status ' + statusClass + '">' + (d.status || '—') + '</span>',
          '      <button class="cert-dl-btn"><span class="material-symbols-outlined">download</span><span>Muat Turun</span></button>',
          '    </div>',
          '  </div>',
          '</div>'
        ].join('\n');
      }

      // ── Shared section wrapper helpers ────────────────────────────────────────

      function wrapLive(label, content) {
        return [
          '<div class="pv-section">',
          '  <p class="pv-label">' + label + '</p>',
          content,
          '</div>'
        ].join('\n');
      }

      function wrapSample(content) {
        return [
          '<div class="pv-divider">',
          '  <p class="pv-divider__note">Contoh di bawah menunjukkan paparan kad yang telah diisi sepenuhnya</p>',
          '</div>',
          '<div class="pv-section pv-section--sample">',
          '  <p class="pv-label">&#8212; CONTOH RUJUKAN &#8212;</p>',
          '  <div class="pv-sample-badge">CONTOH</div>',
          content,
          '</div>'
        ].join('\n');
      }

      // ─────────────────────────────────────────────────────────────────────────
      function ProjectPreview(props) {
        var entry = props.entry;
        var data  = entry.getIn(['data']);

        // ── Live: raw values, no fallback — empty fields show naturally ──
        var liveImagesVal    = data.get('images');
        var liveNewsListVal  = data.get('newsList');
        var liveVideoListVal = data.get('videoList');
        var live = {
          status:       data.get('status')      || '',
          client:       data.get('client')      || '',
          amount:       data.get('amount')      || '',
          date:         data.get('date')        || '',
          description:  data.get('description') || '',
          loc:          data.get('loc')         || '',
          cat:          data.get('cat')         || '',
          category:     data.get('category')    || '',
          isPilihan:    data.get('isPilihan')   || false,
          imgSrc:       getFirstImgSrc(liveImagesVal),
          newsListLen:  liveNewsListVal  ? (liveNewsListVal.size  !== undefined ? liveNewsListVal.size  : (liveNewsListVal.length  || 0)) : 0,
          videoListLen: liveVideoListVal ? (liveVideoListVal.size !== undefined ? liveVideoListVal.size : (liveVideoListVal.length || 0)) : 0
        };

        // ── Sample: always fully populated ──
        var sample = {
          status:      PROJECT_SAMPLE.status,
          client:      PROJECT_SAMPLE.client,
          amount:      PROJECT_SAMPLE.amount,
          date:        PROJECT_SAMPLE.date,
          description: PROJECT_SAMPLE.description,
          loc:         PROJECT_SAMPLE.loc,
          cat:         PROJECT_SAMPLE.cat,
          category:    PROJECT_SAMPLE.category,
          isPilihan:    PROJECT_SAMPLE.isPilihan,
          imgSrc:       PROJECT_SAMPLE.images[0].src,
          newsListLen:  PROJECT_SAMPLE.newsList.length,
          videoListLen: PROJECT_SAMPLE.videoList.length
        };

        var css = [
          '<link rel="preconnect" href="https://fonts.googleapis.com">',
          '<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">',
          '<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">',
          '<style>',
          '*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}',
          'body{font-family:"Inter",sans-serif;background:#f0f0f2;padding:32px;display:flex;flex-direction:column;align-items:center;}',
          '.pv-section{margin-bottom:24px;width:340px;}',
          '.pv-section--sample{opacity:0.7;border:1.5px dashed #9ca3af;border-radius:0.5rem;padding:16px;position:relative;}',
          '.pv-label{font-size:0.6rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#6b7280;text-align:center;margin-bottom:12px;}',
          '.pv-sample-badge{position:absolute;top:0;right:0;background:#6b7280;color:#fff;font-size:0.5rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;padding:3px 10px;border-radius:0 0.5rem 0 0.25rem;}',
          '.pv-divider{width:340px;margin:4px 0 20px;text-align:center;}',
          '.pv-divider__note{font-size:0.62rem;color:#9ca3af;line-height:1.5;border-top:1px dashed #d1d5db;padding-top:16px;}',
          '.dyn-card{width:100%;background:#1a1c1d;color:#fff;border:1px solid rgba(0,0,0,.2);border-radius:0.5rem;overflow:hidden;display:flex;flex-direction:column;position:relative;box-shadow:0 10px 30px -10px rgba(0,0,0,.4);}',
          '.dyn-card__img-wrap{position:relative;height:160px;overflow:hidden;background:#2a2c2e;}',
          '.dyn-card__img{width:100%;height:100%;object-fit:cover;}',
          '.dyn-card__img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#555;font-size:0.75rem;letter-spacing:.05em;text-transform:uppercase;}',
          '.dyn-card__badge-status{position:absolute;top:16px;left:16px;background:#141518;color:#fff;padding:4px 12px;font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:.125rem;display:flex;align-items:center;gap:6px;}',
          '.dyn-card__badge-status--active{background:#b5000b;}',
          '.dyn-card__badge-pilihan{position:absolute;top:16px;right:16px;background:#f59e0b;color:#fff;padding:4px 10px;font-size:.6rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;border-radius:.125rem;}',
          '.dyn-card__body{padding:20px;display:flex;flex-direction:column;flex-grow:1;border-top:3px solid transparent;}',
          '.dyn-card__meta{display:flex;justify-content:space-between;margin-bottom:8px;align-items:center;flex-wrap:wrap;gap:8px;}',
          '.dyn-card__meta-year{font-size:.7rem;font-weight:700;letter-spacing:.1em;color:#fff;background:#b5000b;padding:4px 8px;border-radius:4px;white-space:nowrap;display:inline-flex;align-items:center;}',
          '.dyn-card__meta-cat{font-size:.65rem;font-weight:600;letter-spacing:.05em;color:#a1a1aa;text-transform:uppercase;}',
          '.dyn-card__title{font-family:"Barlow",sans-serif;font-size:.85rem;font-weight:900;line-height:1.35;color:#fff;padding-bottom:16px;text-transform:uppercase;letter-spacing:-.01em;flex-grow:1;}',
          '.dyn-card__client{font-size:.75rem;font-weight:600;color:#d4d4d8;margin-bottom:16px;padding-top:16px;border-top:1px dashed rgba(255,255,255,.1);}',
          '.dyn-card__client-name{font-weight:700;color:#f9f6ee;}',
          '.dyn-card__footer{padding-top:12px;border-top:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:6px;}',
          '.dyn-card__val-block{display:flex;flex-direction:column;align-items:center;text-align:center;padding:8px 12px;width:100%;box-sizing:border-box;margin-bottom:2px;}',
          '.dyn-card__val-title{font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#a1a1aa;margin-bottom:2px;}',
          '.dyn-card__val-amt{font-family:"Barlow",sans-serif;font-size:.95rem;font-weight:900;color:#b5000b;}',

              'October','November','December'];
            dateEl.textContent =
              days[now.getDay()] + ', ' +
              now.getDate() + ' ' +
              months[now.getMonth()] + ' ' +
              now.getFullYear();
          }

          updateClock();
          setInterval(updateClock, 1000);

          // Inject animation keyframes
          var style = document.createElement('style');
          style.textContent = `
            @keyframes fdz-ping {
              0% { box-shadow: 0 0 0 0 rgba(22,163,74,0.4); }
              70% { box-shadow: 0 0 0 8px rgba(22,163,74,0); }
              100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
            }
            @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=Inter:wght@400;500;600&display=swap');
          `;
          document.head.appendChild(style);

          // Assemble
          pulseWrap.appendChild(pulseSvg);
          pulseWrap.appendChild(liveStatus);
          container.appendChild(clock);
          container.appendChild(dateEl);
          container.appendChild(pulseWrap);

          // Inject into auth page
          var logoEl = authPage.querySelector('img')
            || authPage.firstChild;
          if (logoEl && logoEl.parentNode) {
            logoEl.parentNode.insertBefore(
              container,
              logoEl.nextSibling
            );
          } else {
            authPage.prepend(container);
          }
        }
      }

      // Watch for login page to load
      var enhanceObserver = new MutationObserver(
        function() { injectLoginEnhancements(); }
      );
      enhanceObserver.observe(document.body, {
        childList: true, subtree: true
      });

      injectLoginEnhancements();
    });
  </script>

  <script>
    /* ── Conditional Year/Date field visibility ────────────────────────────────
       Watches the CMS form DOM and hides the Year and Tarikh fields (replacing
       them with an info overlay) whenever status is "Ongoing".                 */
    (function () {
      var YEAR_MSG_ID = 'fdz-cond-year-msg';
      var DATE_MSG_ID = 'fdz-cond-date-msg';

      var msgStyle = [
        'display:block',
        'background:#fff8e1',
        'border-left:4px solid #f59e0b',
        'padding:12px 16px',
        'border-radius:4px',
        'color:#92400e',
        'font-size:13px',
        'margin-top:4px'
      ].join(';');

      // Find the status <select> by locating an option with value "Ongoing"
      function findStatusSelect() {
        var selects = document.querySelectorAll('select');
        for (var i = 0; i < selects.length; i++) {
          for (var j = 0; j < selects[i].options.length; j++) {
            if (selects[i].options[j].value === 'Ongoing') return selects[i];
          }
        }
        return null;
      }

      // Walk up from a <label> to find the outermost field wrapper div:
      // the first ancestor that (a) has ≥2 children AND (b) contains a widget input.
      function findFieldWrapper(labelText) {
        var labels = document.querySelectorAll('label');
        for (var i = 0; i < labels.length; i++) {
          var lbl = labels[i];
          var txt = lbl.textContent.replace(/\s*\*\s*/g, '').replace(/\s+/g, ' ').trim();
          if (txt !== labelText) continue;
          var el = lbl;
          for (var k = 0; k < 6; k++) {
            var p = el.parentElement;
            if (!p || p === document.body) break;
            if (p.children.length >= 2 && p.querySelector('input, select, textarea')) {
              return p;
            }
            el = p;
          }
          // Fallback: 2 levels above label
          return lbl.parentElement ? lbl.parentElement.parentElement : null;
        }
        return null;
      }

      function applyVisibility(status) {
        var isOngoing = status === 'Ongoing';

        [
          { labelText: 'Tarikh Siap', msgId: DATE_MSG_ID, msg: '⏳ Projek masih berjalan — Tarikh siap belum ditetapkan' }
        ].forEach(function (item) {
          // Remove any existing overlay first
          var old = document.getElementById(item.msgId);
          if (old && old.parentNode) old.parentNode.removeChild(old);

          var wrapper = findFieldWrapper(item.labelText);
          if (!wrapper) return;

          if (isOngoing) {
            wrapper.style.display = 'none';
            var div = document.createElement('div');
            div.id = item.msgId;
            div.setAttribute('style', msgStyle);
            div.textContent = item.msg;
            wrapper.parentNode.insertBefore(div, wrapper);
          } else {
            wrapper.style.display = '';
          }
        });
      }

      function setup() {
        var sel = findStatusSelect();
        if (!sel) return;

        // Attach listeners only once per element instance
        if (!sel._fdzSetup) {
          sel._fdzSetup = true;
          var handler = function () { applyVisibility(sel.value); };
          sel.addEventListener('change', handler);
          sel.addEventListener('input', handler);
        }

        // Apply immediately: handles both initial load and navigation to an
        // existing "Ongoing" entry where fields should be hidden on open
        applyVisibility(sel.value);
      }

      // Debounce mutations — React re-renders fire dozens of callbacks at once
      var debounce = null;
      var observer = new MutationObserver(function () {
        clearTimeout(debounce);
        debounce = setTimeout(setup, 200);
      });

      observer.observe(document.body, { childList: true, subtree: true, attributes: true });

      // Try immediately in case CMS already rendered before this script ran
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
      } else {
        setup();
      }
    })();
  </script>

  <script>
    /* ── Featured Order conditional visibility ─────────────────────────────────
       Hides the "Kedudukan dalam Grid" field and replaces it with an info banner
       whenever the "Papar dalam Sijil Pilihan" toggle is OFF.                  */
    (function () {
      var ORDER_MSG_ID = 'fdz-cond-order-msg';

      var msgStyle = [
        'display:block',
        'background:#f0f4ff',
        'border-left:4px solid #6366f1',
        'padding:12px 16px',
        'border-radius:4px',
        'color:#3730a3',
        'font-size:13px',
        'margin-top:4px'
      ].join(';');

      function findToggle() {
        var buttons = document.querySelectorAll('button[role="switch"]');
        for (var i = 0; i < buttons.length; i++) {
          var btn = buttons[i];
          var container = btn.parentElement;
          for (var k = 0; k < 8; k++) {
            if (!container) break;
            var labels = container.querySelectorAll('label');
            for (var j = 0; j < labels.length; j++) {
              if (labels[j].textContent.indexOf('Papar dalam Sijil Pilihan') !== -1) {
                return btn;
              }
            }
            container = container.parentElement;
          }
        }
        return null;
      }

      function findFieldWrapper(labelText) {
        var labels = document.querySelectorAll('label');
        for (var i = 0; i < labels.length; i++) {
          var lbl = labels[i];
          var txt = lbl.textContent.replace(/\s*\*\s*/g, '').replace(/\s+/g, ' ').trim();
          if (txt !== labelText) continue;
          var el = lbl;
          for (var k = 0; k < 6; k++) {
            var p = el.parentElement;
            if (!p || p === document.body) break;
            if (p.children.length >= 2 && p.querySelector('input, select, textarea')) {
              return p;
            }
            el = p;
          }
          return lbl.parentElement ? lbl.parentElement.parentElement : null;
        }
        return null;
      }

      function applyFeaturedOrderVisibility() {
        var toggle = findToggle();
        if (!toggle) return;

        var isOn = toggle.getAttribute('aria-checked') === 'true';

        var old = document.getElementById(ORDER_MSG_ID);
        if (old && old.parentNode) old.parentNode.removeChild(old);

        var wrapper = findFieldWrapper('Kedudukan dalam Grid (1–6)');
        if (!wrapper) return;

        if (isOn) {
          wrapper.style.display = '';
        } else {
          wrapper.style.display = 'none';
          var div = document.createElement('div');
          div.id = ORDER_MSG_ID;
          div.setAttribute('style', msgStyle);
          div.textContent = 'ℹ️ Aktifkan "Papar dalam Sijil Pilihan" dahulu untuk tetapkan kedudukan grid.';
          wrapper.parentNode.insertBefore(div, wrapper);
        }
      }

      var debounce = null;
      var observer = new MutationObserver(function () {
        clearTimeout(debounce);
        debounce = setTimeout(applyFeaturedOrderVisibility, 150);
      });

      observer.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['aria-checked']
      });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', applyFeaturedOrderVisibility);
      } else {
        applyFeaturedOrderVisibility();
      }
    })();
  </script>
