<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FDZ Engineering — CMS Admin</title>
  <link rel="cms-config-url" href="/admin/config.yml">
  <!-- Leaflet for the map-based coordinate picker widget. Self-hosted (removes the
       unpkg single-point-of-failure); falls back to the CDN only if the local copy
       ever fails to load. -->
  <link rel="stylesheet" href="/admin/vendor/leaflet-1.9.4.css" onerror="this.onerror=null;this.href='https://unpkg.com/leaflet@1.9.4/dist/leaflet.css'" />
  <script src="/admin/vendor/leaflet-1.9.4.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';document.head.appendChild(s);"></script>
</head>
<body>
  <script>
    window.addEventListener('load', function () {
      var h   = window.h;
      var CMS = window.CMS;
      if (!h || !CMS) return;

      // ── Sample fallback data ────────────────────────────────────────────────
      var PROJECT_SAMPLE = {
        status: 'Ongoing',
        year: '2026',
        date: '29 Jan 2019',
        amount: '2500000',
        client: 'Jabatan Kerja Raya Sarawak',
        description: 'Cadangan Pembinaan Jalan Penghubung',
        category: 'Infrastruktur Jalan Raya',
        cat: 'Infrastructure',
        division: 'Kuching',
        loc: 'Kuching, Sarawak',
        coordinates: '1.5556, 110.3397',
        accuracy: '',
        isPilihan: true,
        paragraph: 'Projek ini melibatkan pembinaan jalan penghubung sepanjang 2.5km di kawasan pinggir bandar Kuching.',
        images: [{ src: 'https://placehold.co/600x400?text=Gambar+Projek', alt: 'Gambar projek sample' }],
        newsList: [{ title: 'Majlis Penyerahan Projek', link: 'https://example.com' }],
        videoList: [{ title: 'Video Kemajuan Projek', link: 'https://youtube.com' }]
      };

      var CERT_SAMPLE = {
        num: '01',
        title: 'CIDB G7 — Gred Tertinggi Pembinaan',
        issuer: 'Lembaga Pembangunan Industri Pembinaan Malaysia',
        brief: 'Sijil pendaftaran kontraktor CIDB di bawah Akta CIDB 1994. Gred G7 (tertinggi) membolehkan FDZ Engineering menender projek pembinaan tanpa had nilai kontrak.',
        category: 'contractor',
        tags: ['G7', 'CIDB', 'Bumiputera'],
        status: 'Aktif',
        isFeatured: true,
        featuredOrder: 1,
        featuredTitle: '',
        featuredIssuer: '',
        logoImage: 'https://placehold.co/120x80?text=Logo+Sijil',
        iconName: 'verified',
        iconColor: 'red',
        downloadFile: '',
        validUntil: '2029-09-16',
        meta: [
          { label: 'No. Pendaftaran', value: '0120110824-SR135974' },
          { label: 'Gred', value: 'G7/B, G7/CE, G7/ME' }
        ]
      };

      // ── Extract first image src from Immutable List or plain JS array ──────────
      function getFirstImgSrc(imagesVal) {
        if (!imagesVal) return '';
        var first = imagesVal.getIn ? imagesVal.getIn([0]) : imagesVal[0];
        if (!first) return '';
        if (typeof first === 'string') return first;
        if (first.get) return first.get('src') || '';
        return first.src || '';
      }

      // ── Convert Immutable List or plain array → plain JS array ───────────────
      function toArray(val) {
        if (!val) return [];
        if (val.toJS) return val.toJS();
        return Array.isArray(val) ? val : [];
      }

      // ── brief → info (ⓘ) icon next to the title; native hover shows the text ──
      function briefHint(brief) {
        if (!brief) return '';
        var plain = String(brief).replace(/<[^>]+>/g, '').replace(/"/g, '&quot;');
        return '<span class="cert-hint-ico" title="' + plain + '"><span class="material-symbols-outlined">info</span></span>';
      }

      // ── ISO date (2027-08-22) → "22 Aug 2027" for the derived expiry row ─────
      function fmtValidUntil(iso) {
        var m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
        if (!m) return iso || '';
        var mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(m[2], 10) - 1] || '';
        return m[3] + ' ' + mon + ' ' + m[1];
      }

      var CERT_EXPIRY_RE = /valid until|sah sehingga|tempoh sah laku|habis tempoh|tarikh luput/i;

      // ── meta [{label,value}] (+ validUntil) → the label/value detail table ────
      // Mirrors certificates.html: appends a derived "Valid until" row from
      // validUntil when the cert doesn't already list a validity period.
      function buildMetaTable(meta, validUntil) {
        meta = meta || [];
        var hasExpiry = meta.some(function (m) { return m && CERT_EXPIRY_RE.test(m.label || ''); });
        var rows = meta.map(function (m) {
          if (!m) return '';
          var label = typeof m === 'string' ? m : (m.label || '');
          var value = typeof m === 'string' ? '' : (m.value || '');
          return '<div class="cert-meta-row"><span class="cert-meta-label">' + label + '</span><span class="cert-meta-value">' + value + '</span></div>';
        }).join('');
        if (!hasExpiry && validUntil) {
          rows += '<div class="cert-meta-row"><span class="cert-meta-label">Valid until</span><span class="cert-meta-value">' + fmtValidUntil(validUntil) + '</span></div>';
        }
        return rows ? '<div class="cert-meta-table">' + rows + '</div>' : '';
      }

      // ── Format raw number string → "RM X,XXX,XXX" (handles both old and new format) ──
      function formatAmount(val) {
        if (!val) return '—';
        var s = val.toString().trim();
        if (s.toUpperCase().startsWith('RM')) return s;
        var digits = s.replace(/[^0-9]/g, '');
        if (!digits) return s;
        return 'RM ' + digits.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      }

      // ── Widget 1: Currency MYR ─────────────────────────────────────────────────
      // Normalize any stored amount to raw whole-ringgit digits. Accepts raw
      // digits ("710000") AND legacy pre-formatted values ("RM 710,000.00").
      function currencyToRaw(v) {
        var s = String(v == null ? '' : v).replace(/[^0-9.]/g, '');
        if (s.indexOf('.') !== -1) s = s.split('.')[0]; // drop cents
        s = s.replace(/^0+(?=\d)/, '');                 // strip leading zeros
        return s;
      }
      function currencyCommas(raw) {
        if (!raw) return '';
        return raw.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
      }

      function CurrencyMYRControl(props) {
        function handleChange(e) {
          props.onChange(currencyToRaw(e.target.value));
        }
        return h('div', {
          style: { display: 'flex', alignItems: 'center', borderRadius: '4px', overflow: 'hidden', border: '1px solid #ddd', background: '#fff', height: '40px' }
        },
          h('span', {
            style: { padding: '0 12px', background: '#f0f0f2', borderRight: '1px solid #ddd', fontWeight: '700', color: '#555', fontSize: '0.85rem', display: 'flex', alignItems: 'center', height: '100%', userSelect: 'none', flexShrink: '0' }
          }, 'RM'),
          h('input', {
            type: 'text',
            id: props.forID,
            value: currencyCommas(currencyToRaw(props.value)),
            placeholder: 'Contoh: 2500000',
            onChange: handleChange,
            style: { border: 'none', outline: 'none', padding: '0 12px', flex: 1, fontSize: '0.9rem', fontFamily: 'inherit', height: '100%', background: 'transparent' }
          })
        );
      }

      function CurrencyMYRPreview(props) {
        var raw = currencyToRaw(props.value);
        if (!raw) return h('span', {}, '—');
        return h('span', {}, 'RM ' + currencyCommas(raw));
      }

      CMS.registerWidget('currency-myr', CurrencyMYRControl, CurrencyMYRPreview);

      // ── Widget 2: Conditional Year & Date ─────────────────────────────────────
      function getEntryStatus(props) {
        // Read the live select value first — props.entry reflects the last-saved
        // state and will be stale when the user changes status without saving.
        try {
          var selects = document.querySelectorAll('select');
          for (var i = 0; i < selects.length; i++) {
            var opts = selects[i].options;
            for (var j = 0; j < opts.length; j++) {
              if (opts[j].value === 'Ongoing') return selects[i].value;
            }
          }
        } catch(e) {}
        try {
          var entry = props.entry;
          if (entry && entry.getIn) return entry.getIn(['data', 'status']) || '';
        } catch(e) {}
        return '';
      }

      var conditionalBannerStyle = {
        display: 'flex', alignItems: 'center', gap: '8px',
        padding: '8px 12px', background: '#fef9c3', border: '1px solid #fde047',
        borderRadius: '4px', fontSize: '0.78rem', color: '#713f12', marginBottom: '6px'
      };

      function conditionalInput(props, placeholder) {
        return h('input', {
          type: 'text',
          id: props.forID,
          value: props.value || '',
          placeholder: placeholder,
          onChange: function(e) { props.onChange(e.target.value); },
          style: {
            width: '100%', padding: '8px 12px',
            border: '1px solid #ddd', borderRadius: '4px',
            fontSize: '0.9rem', fontFamily: 'inherit'
          }
        });
      }

      function conditionalBanner() {
        return h('div', { style: conditionalBannerStyle },
          h('span', { style: { fontWeight: '700', flexShrink: '0' } }, '!'),
          'Projek masih berjalan — tarikh siap belum ditetapkan'
        );
      }

      function YearConditionalControl(props) {
        var isOngoing = getEntryStatus(props) === 'Ongoing';
        return h('div', {},
          isOngoing ? conditionalBanner() : null,
          conditionalInput(props, 'Contoh: 2024')
        );
      }

      CMS.registerWidget('year-conditional', YearConditionalControl);

      // Convert between the stored "DD MMM YYYY" (English) string and ISO for the
      // native calendar picker. "Ongoing" (and anything unparseable) yields ''.
      var FDZ_MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      function fdzDateToISO(v) {
        var m = /(\d{1,2})\s+([A-Za-z]{3})[A-Za-z]*\s+(\d{4})/.exec(v || '');
        if (!m) return '';
        var mi = FDZ_MON.indexOf(m[2].slice(0, 3));
        if (mi < 0) return '';
        return m[3] + '-' + String(mi + 1).padStart(2, '0') + '-' + String(parseInt(m[1], 10)).padStart(2, '0');
      }
      function fdzISOToDate(iso) {
        var m = /(\d{4})-(\d{2})-(\d{2})/.exec(iso || '');
        if (!m) return '';
        return String(parseInt(m[3], 10)).padStart(2, '0') + ' ' + FDZ_MON[parseInt(m[2], 10) - 1] + ' ' + m[1];
      }

      function DateConditionalControl(props) {
        var isOngoing = getEntryStatus(props) === 'Ongoing';
        var picker = h('input', {
          type: 'date',
          value: fdzDateToISO(props.value),
          title: 'Pilih tarikh dari kalendar',
          onChange: function (e) { var s = fdzISOToDate(e.target.value); if (s) props.onChange(s); },
          style: { padding: '7px 10px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '0.9rem', fontFamily: 'inherit', flexShrink: '0', height: '38px' }
        });
        var text = h('input', {
          type: 'text', id: props.forID, value: props.value || '',
          placeholder: 'Contoh: 29 Jan 2019',
          onChange: function (e) { props.onChange(e.target.value); },
          style: { flex: '1', minWidth: '130px', padding: '8px 12px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '0.9rem', fontFamily: 'inherit', height: '38px' }
        });
        return h('div', {},
          isOngoing ? conditionalBanner() : null,
          h('div', { style: { display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' } }, picker, text),
          h('p', { style: { fontSize: '0.72rem', color: '#5f5e5e', marginTop: '5px', lineHeight: '1.5' } },
            'Pilih tarikh dari kalendar (kiri) — ia diisi automatik dalam format "29 Jan 2019". Atau taip terus di kotak kanan.')
        );
      }

      CMS.registerWidget('date-conditional', DateConditionalControl);

      // ── Widget: Map coordinate picker ─────────────────────────────────────────
      // Click the map (or drag the pin) to set a project's GPS. Stores the same
      // "lat, lng" string the coordinates field has always used. Uses Leaflet
      // (loaded in <head>). Sarawak-centred default.
      function parseLatLng(v) {
        var m = /(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)/.exec(v || '');
        return m ? [parseFloat(m[1]), parseFloat(m[2])] : null;
      }
      // Branded teardrop pin matching the live project map (projects.html pmMakeIcon),
      // in FDZ red — so the admin picker looks like the map visitors see.
      function fdzPinIcon() {
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="40" viewBox="0 0 32 40">'
          + '<path d="M16 2C9.925 2 5 6.925 5 13c0 8.25 11 25 11 25S27 21.25 27 13C27 6.925 22.075 2 16 2z" fill="#b5000b" stroke="rgba(0,0,0,0.3)" stroke-width="1"/>'
          + '<circle cx="16" cy="13" r="5.5" fill="#e30613" opacity="0.95"/>'
          + '<circle cx="16" cy="13" r="2.5" fill="#ffffff" opacity="0.95"/>'
          + '</svg>';
        return L.divIcon({ html: svg, className: '', iconSize: [32, 40], iconAnchor: [16, 40], popupAnchor: [0, -42] });
      }
      function CoordinateMapControl(props) {
        function initMap(el) {
          if (!el || el._fdzMap) return;
          if (typeof L === 'undefined') { setTimeout(function () { initMap(el); }, 300); return; }
          var here = parseLatLng(props.value);
          var map = L.map(el).setView(here || [2.9, 112.6], here ? 15 : 7);
          var gOpts = { maxZoom: 20, subdomains: ['mt0', 'mt1', 'mt2', 'mt3'] };
          // Same Google roadmap tiles as the live project map (projects.html pmInit)
          var roadmap = L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&hl=en&gl=MY', gOpts);
          // Satellite + labels (hybrid) — lets the owner pinpoint the actual building.
          var satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&hl=en&gl=MY', gOpts);
          roadmap.addTo(map);
          L.control.layers({ 'Peta': roadmap, 'Satelit': satellite }, null, { position: 'topright' }).addTo(map);
          el._fdzMap = map;
          el._fdzMarker = null;
          function place(latlng) {
            var s = latlng.lat.toFixed(6) + ', ' + latlng.lng.toFixed(6);
            props.onChange(s);
            if (el._fdzMarker) { el._fdzMarker.setLatLng(latlng); }
            else {
              el._fdzMarker = L.marker(latlng, { draggable: true, icon: fdzPinIcon() }).addTo(map);
              el._fdzMarker.on('dragend', function (e) { place(e.target.getLatLng()); });
            }
          }
          el._fdzPlace = place;
          if (here) place({ lat: here[0], lng: here[1] });
          map.on('click', function (e) { place(e.latlng); });
          setTimeout(function () { map.invalidateSize(); }, 250);
        }
        // Geocode a typed place name (Nominatim, Malaysia-biased) → fly there & drop the pin.
        function runSearch(ev) {
          if (ev && ev.preventDefault) ev.preventDefault();
          var root = ev.currentTarget.closest('.fdz-coord');
          if (!root) return;
          var input = root.querySelector('.fdz-coord-search-input');
          var mapEl = root.querySelector('.fdz-coord-map');
          var status = root.querySelector('.fdz-coord-search-status');
          var q = ((input && input.value) || '').trim();
          if (!q) { if (status) status.textContent = 'Taip nama tempat dahulu.'; return; }
          if (status) status.textContent = 'Mencari…';
          // Expand common Malay place abbreviations so Nominatim can resolve them.
          var ABBR = { kg: 'Kampung', kpg: 'Kampung', jln: 'Jalan', jl: 'Jalan', tmn: 'Taman', lrg: 'Lorong', bkt: 'Bukit', bdr: 'Bandar', psr: 'Pasar', spg: 'Simpang' };
          var qNorm = q.replace(/\b([A-Za-z]+)\.?/g, function (m, w) { return ABBR[w.toLowerCase()] || w; });
          fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=my&q=' + encodeURIComponent(qNorm), { headers: { 'Accept': 'application/json' } })
            .then(function (r) { return r.json(); })
            .then(function (a) {
              if (!a || !a.length) { if (status) status.textContent = '“' + q + '” tidak dijumpai. Cuba nama lain, atau klik terus pada peta.'; return; }
              var lat = parseFloat(a[0].lat), lng = parseFloat(a[0].lon);
              var map = mapEl && mapEl._fdzMap;
              if (map) map.setView([lat, lng], 16);
              if (mapEl && mapEl._fdzPlace) mapEl._fdzPlace({ lat: lat, lng: lng });
              if (status) status.textContent = '✓ Dijumpai: ' + (a[0].display_name || q) + '. Seret penanda untuk ketepatan.';
            })
            .catch(function () { if (status) status.textContent = 'Ralat mencari — semak sambungan internet, atau klik terus pada peta.'; });
        }
        function onSearchKey(ev) { if (ev.key === 'Enter') runSearch(ev); }
        return h('div', { className: 'fdz-coord' },
          h('input', {
            type: 'text', id: props.forID, value: props.value || '',
            placeholder: 'Contoh: 1.551230, 110.372326',
            onChange: function (e) { props.onChange(e.target.value); },
            style: { width: '100%', padding: '8px 12px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '0.9rem', fontFamily: 'inherit', marginBottom: '8px' }
          }),
          h('div', { style: { display: 'flex', gap: '8px', marginBottom: '8px', flexWrap: 'wrap' } },
            h('input', {
              type: 'text', className: 'fdz-coord-search-input',
              placeholder: 'Cari nama tempat… cth: Kg. Stass, Samarahan',
              onKeyDown: onSearchKey,
              style: { flex: '1', minWidth: '180px', padding: '8px 12px', border: '1px solid #ddd', borderRadius: '4px', fontSize: '0.9rem', fontFamily: 'inherit', height: '38px' }
            }),
            h('button', {
              type: 'button', onClick: runSearch,
              style: { padding: '8px 16px', border: 'none', borderRadius: '4px', background: '#b5000b', color: '#fff', fontSize: '0.9rem', fontWeight: '600', cursor: 'pointer', height: '38px', fontFamily: 'inherit', whiteSpace: 'nowrap' }
            }, '🔍 Cari')
          ),
          h('div', {
            ref: initMap, className: 'fdz-coord-map',
            style: { height: '320px', width: '100%', borderRadius: '6px', overflow: 'hidden', border: '1px solid #ddd', zIndex: 0 }
          }),
          h('p', { className: 'fdz-coord-search-status', style: { fontSize: '0.72rem', color: '#b5000b', marginTop: '6px', minHeight: '1em', lineHeight: '1.5' } }, ''),
          h('p', {
            style: { fontSize: '0.72rem', color: '#5f5e5e', marginTop: '4px', lineHeight: '1.5' }
          }, 'Cari nama tempat di atas, atau klik terus pada peta untuk letak penanda (seret untuk laraskan). Tukar ke “Satelit” di penjuru kanan peta untuk nampak bangunan sebenar. Koordinat diisi automatik.')
        );
      }
      function CoordinateMapPreview(props) {
        return h('span', {}, props.value || '—');
      }
      CMS.registerWidget('coordinate-map', CoordinateMapControl, CoordinateMapPreview);

      // ── Shared card/item builders (accept plain JS field objects) ────────────

      // Category → display label + icon, matching the live projects page
      var CAT_BM = {
        'Building': 'Building & Facilities',
        'Infrastructure': 'Infrastructure',
        'Maintenance': 'Maintenance',
        'Telecom': 'Telecom',
        'Utilities': 'Utilities'
      };
      var CAT_ICON = {
        'Building': 'apartment',
        'Infrastructure': 'road',
        'Maintenance': 'construction',
        'Telecom': 'cell_tower',
        'Utilities': 'water_pump'
      };

      function buildProjectCard(d) {
        var isOngoing  = d.status === 'Ongoing';
        var badgeClass = isOngoing ? ' dyn-card__badge-status--active' : '';
        var statusHtml = isOngoing ? '<span class="dyn-ping"></span>Ongoing' : 'Completed';
        var dateBadge = (!isOngoing && d.date)
          ? '<span class="dyn-card__meta-year">' + d.date + '</span>'
          : '<span></span>';
        var catLabel = CAT_BM[d.cat] || d.cat || '';
        var clientHtml = isOngoing
          ? '<p class="dyn-card__client">Client: <span class="dyn-card__client-name">' + (d.client || '—') + '</span></p>'
          : '';
        var newsChip = (d.newsListLen > 0)
          ? '<span class="dyn-chip dyn-chip--news"><span class="material-symbols-outlined" style="font-size:13px;">link</span>' + d.newsListLen + ' Related Link' + (d.newsListLen === 1 ? '' : 's') + '</span>'
          : '';
        var videoChip = (d.videoListLen > 0)
          ? '<span class="dyn-chip dyn-chip--video"><span class="material-symbols-outlined" style="font-size:13px;">play_circle</span>' + d.videoListLen + ' Video</span>'
          : '';
        var imgHtml = (d.imgSrc && d.imgSrc !== '')
          ? '<img class="dyn-card__img" src="' + d.imgSrc + '" alt="Project">'
          : '<div class="dyn-card__no-img"><span class="material-symbols-outlined">' + (CAT_ICON[d.cat] || 'folder_open') + '</span></div>';
        return [
          '<div class="dyn-card">',
          '  <div class="dyn-card__img-wrap">',
          '    ' + imgHtml,
          '    <span class="dyn-card__badge-status' + badgeClass + '">' + statusHtml + '</span>',
          '    <img src="/fdzeng-logo.png" class="dyn-card__brand-watermark" alt="">',
          '  </div>',
          '  <div class="dyn-card__body">',
          '    <div class="dyn-card__meta">',
          '      ' + dateBadge,
          '      <span class="dyn-card__meta-cat">' + catLabel + '</span>',
          '    </div>',
          '    <h3 class="dyn-card__title" style="margin-bottom:' + (isOngoing ? '0' : 'auto') + '">' + (d.description || '') + '</h3>',
          '    ' + clientHtml,
          '    <div class="dyn-card__footer">',
          '      <div class="dyn-card__val-block">',
          '        <p class="dyn-card__val-title">Project Value</p>',
          '        <p class="dyn-card__val-amt">' + formatAmount(d.amount) + '</p>',
          '      </div>',
          '      ' + newsChip,
          '      ' + videoChip,
          '    </div>',
          '  </div>',
          '</div>'
        ].join('\n');
      }

      // Category badge colours — same palette as the live map popup.
      var CAT_COLORS_ADMIN = {
        Infrastructure: { bg: 'rgba(59,130,246,0.18)',  border: 'rgba(59,130,246,0.45)', text: '#93c5fd' },
        Telecom:        { bg: 'rgba(236,72,153,0.18)',  border: 'rgba(236,72,153,0.45)', text: '#f9a8d4' },
        Utilities:      { bg: 'rgba(14,165,233,0.18)',  border: 'rgba(14,165,233,0.45)', text: '#7dd3fc' },
        Maintenance:    { bg: 'rgba(245,158,11,0.18)',  border: 'rgba(245,158,11,0.45)', text: '#fcd34d' },
        Building:       { bg: 'rgba(139,92,246,0.18)',  border: 'rgba(139,92,246,0.45)', text: '#c4b5fd' }
      };

      // Small static map (3×3 OSM tile block + pin) for context, then the pin
      // popup card so the editor sees exactly what a visitor sees on tap.
      function buildProjectMap(d) {
        var parts = String(d.coordinates || '').split(',');
        var lat = parseFloat(parts[0]), lng = parseFloat(parts[1]);
        var cap = '<p class="pv-pin-cap">&#9660; ' + fdzL('Info shown when the pin is tapped on the website map', 'Info bila pin ditekan di peta laman web') + '</p>';
        var popup = buildPinPopup(d);
        if (!isFinite(lat) || !isFinite(lng)) {
          return '<div class="pv-map pv-map--empty">' + fdzL('No coordinates yet — click on the map in the "GPS Coordinates" field', 'Tiada koordinat lagi — klik pada peta di medan "Koordinat GPS"') + '</div>' + cap + popup;
        }
        var z = 14;
        var txF = (lng + 180) / 360 * Math.pow(2, z);
        var latR = lat * Math.PI / 180;
        var tyF = (1 - Math.log(Math.tan(latR) + 1 / Math.cos(latR)) / Math.PI) / 2 * Math.pow(2, z);
        var cx = Math.floor(txF), cy = Math.floor(tyF);
        var pinX = ((txF - (cx - 1)) / 3 * 100).toFixed(2);
        var pinY = ((tyF - (cy - 1)) / 3 * 100).toFixed(2);
        var tiles = '';
        for (var ty = cy - 1; ty <= cy + 1; ty++) {
          for (var tx = cx - 1; tx <= cx + 1; tx++) {
            tiles += '<img src="https://mt' + (Math.abs(tx + ty) % 4) + '.google.com/vt/lyrs=m&x=' + tx + '&y=' + ty + '&z=' + z + '&hl=en&gl=MY" alt="" loading="lazy">';
          }
        }
        return [
          '<div class="pv-map">',
          '  <div class="pv-map__tiles">' + tiles + '</div>',
          '  <div class="pv-map__pin" style="left:' + pinX + '%;top:' + pinY + '%;"><span class="material-symbols-outlined">location_on</span></div>',
          '</div>',
          '<div class="pv-map-coord">' + d.coordinates + '</div>',
          cap,
          popup
        ].join('\n');
      }

      // These two collections store only REFERENCES (a project's description / a
      // cert's title). To show the REAL card visuals — like the Gallery preview
      // does — we fetch the compiled site data (/projects-data.json,
      // /certifications-data.json) and render the actual site cards
      // (buildProjectCard / buildCertCard) in the chosen order. Uses Decap's global
      // createClass so the card render can re-run once the fetch resolves; falls

      var createClass = window.createClass;

      var FEATURED_DATA = { projects: null, certs: null };
      function fetchFeaturedJson(key, url) {
        if (FEATURED_DATA[key]) return Promise.resolve(FEATURED_DATA[key]);
        return fetch(url, { cache: 'no-store' })
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (arr) { FEATURED_DATA[key] = Array.isArray(arr) ? arr : []; return FEATURED_DATA[key]; })
          .catch(function () { FEATURED_DATA[key] = []; return FEATURED_DATA[key]; });
      }
      // Warm the cache early so the cards are ready by the time the tab is opened.
      fetchFeaturedJson('projects', '/projects-data.json');
      fetchFeaturedJson('certs', '/certifications-data.json');

      function fpEsc(s) {
        return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      }
      function fpRefNames(entry, field) {
        return toArray(entry.getIn(['data']).get('items')).map(function (it) {

          return it[field] || '';
        }).filter(Boolean);
      }
      function normalizeProjectRecord(p) {
        var imgs = p.images || [];
        var imgSrc = imgs.length ? (typeof imgs[0] === 'string' ? imgs[0] : (imgs[0].src || '')) : '';

          status: p.status || '', client: p.client || '', amount: p.amount || '',
          date: p.date || '', description: p.description || '', cat: p.cat || '',
          loc: p.loc || '', division: p.division || '',

          newsListLen: (p.newsList || []).length,
          videoListLen: (p.videoList || []).length

        return [

          // repaints on top). A fixed-height virtualized list can't grow rows, so we

      // Brand the CMS top header: red accent underline on the bar itself (set via
      // JS so it lands only on the header element, not its nav descendants) + the
      // FDZ logo. Self-heals if React re-renders.
      function brandHeader() {
        var hdr = document.querySelector("[class*='AppHeader']");
        if (!hdr) return;
        hdr.style.borderBottom = '3px solid #b5000b';
        hdr.style.boxShadow = '0 2px 14px rgba(0,0,0,0.05)';
        if (hdr.querySelector('#fdz-hdr-logo')) return;
        var content = hdr.querySelector("[class*='AppHeaderContent']") || hdr;
        var logo = document.createElement('img');
        logo.id = 'fdz-hdr-logo';
        logo.src = '/fdzeng-logo.png';
        logo.alt = 'FDZ Engineering';
        content.insertBefore(logo, content.firstChild);
      }

      // confuses first-time users, so we say "Update Website". Kept small and
      // applied in both languages (the BM equivalents live in FDZ_I18N above).
      var FDZ_RELABEL_EN = {
        "Publish": "Update Website",
        "Publish now": "Update Website now",

      // Language picker for text WE render (Panduan + preview panes + injected
      // badges). These live outside Decap's DOM (help overlay is skipped by the
      // translator; previews render in a separate iframe), so they can't be reached
      // by fdzTranslateTree — they choose their own language via fdzL(). English is the
      // default; toggling reloads, so fdzL() is read fresh each load.
      // IMPORTANT: assigned to window because the preview render functions live in a
      // SEPARATE window-load handler (earlier in this file) and must reach fdzL() too.
      window.fdzL = function fdzL(en, bm) { return fdzLang === 'bm' ? bm : en; };

      // Swap interface text via the active map: full BM translation in BM mode,
      // or just the friendlier English relabels ("Publish" -> "Update Website") in
      // EN mode. Idempotent (a translated node no longer matches a key). Skips
      // inputs/editors/our own UI so it never touches content the user is typing.
      function fdzActiveMap() { return fdzLang === 'bm' ? FDZ_I18N : FDZ_RELABEL_EN; }
      function fdzTranslateTree() {
        var map = fdzActiveMap();
        var root = document.getElementById('nc-root') || document.body;
        if (!root || !document.createTreeWalker) return;
        var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
          acceptNode: function (node) {
            var v = node.nodeValue;
            if (!v) return NodeFilter.FILTER_REJECT;
            if (!map.hasOwnProperty(v.trim())) return NodeFilter.FILTER_REJECT;
            for (var el = node.parentNode; el && el !== root; el = el.parentNode) {
              var tag = el.tagName;
              if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
              if (el.isContentEditable) return NodeFilter.FILTER_REJECT;
              var id = el.id;
              if (id === 'fdz-lang-btn' || id === 'fdz-help-btn' || id === 'fdz-help-overlay') return NodeFilter.FILTER_REJECT;
            }
            return NodeFilter.FILTER_ACCEPT;
          }
        });
        var hits = [], n;
        while ((n = walker.nextNode())) hits.push(n);
        for (var i = 0; i < hits.length; i++) {
          var t = hits[i].nodeValue.trim();
          var rep = map[t];
          if (rep) hits[i].nodeValue = hits[i].nodeValue.replace(t, rep);
        }
      }
      function translateTick() { fdzTranslateTree(); }

        fdzCounts.loading = true;
        function grab(url) {
          return fetch(url, { cache: 'no-store' })
            .then(function (r) { return r.ok ? r.json() : []; })
            .catch(function () { return []; });
        }
        Promise.all([
          grab('/content/projects-index.json'),
          grab('/content/certifications-index.json')
        ]).then(function (res) {
          fdzCounts.projects       = Array.isArray(res[0]) ? res[0].length : null;
          fdzCounts.certifications = Array.isArray(res[1]) ? res[1].length : null;
          fdzCounts.loaded  = true;
          fdzCounts.loading = false;
          injectCollectionCounts();
        });
      }

      function injectCollectionCounts() {
        if (!document.querySelector("[class*='AppHeader']")) return; // CMS only, not login
        if (!fdzCounts.loaded) { loadCollectionCounts(); return; }
        var links = document.querySelectorAll("[class*='SidebarNavLink'],[class*='NavLink']");
        Array.prototype.forEach.call(links, function (link) {
          var href = link.getAttribute('href') || '';
          var m = href.match(/collections\/([^/?#]+)/);
          if (!m) return;
          var count = m[1] === 'projects'       ? fdzCounts.projects
                    : m[1] === 'certifications' ? fdzCounts.certifications
                    : null;
          if (count == null) return;
          var txt = String(count);
          var badge = link.querySelector('.fdz-count-badge');
          // IMPORTANT: only mutate the DOM when something actually changes.
          // This runs inside the MutationObserver, so writing textContent (or
          // appending) unconditionally would re-trigger the observer and loop
          // forever, freezing the CMS after login.
          if (badge) {
            if (badge.textContent !== txt) badge.textContent = txt;
            return;
          }
          badge = document.createElement('span');
          badge.className = 'fdz-count-badge';
          badge.title = 'Jumlah ' + (m[1] === 'projects' ? 'projek' : 'sijil');
          badge.textContent = txt;
          link.appendChild(badge);

      // ── ⭐ Featured markers on collection list cards ──────────────────────────
      // Which projects/certs are "picked as featured" lives in the reference files
      // (content/featured-projects.json → project descriptions; featured-
      // certificates.json → cert titles). Load them, then tag the matching entry
      // cards in the Projects / Certifications list with a ⭐ ribbon.
      var FEATURED_REFS = { projects: null, certs: null, loaded: false, loading: false };
      function loadFeaturedRefs(cb) {
        if (FEATURED_REFS.loaded) { if (cb) cb(); return; }
        if (FEATURED_REFS.loading) return;
        FEATURED_REFS.loading = true;
        function grab(url) {
          return fetch(url, { cache: 'no-store' })
            .then(function (r) { return r.ok ? r.json() : { items: [] }; })
            .catch(function () { return { items: [] }; });
        }
        Promise.all([
          grab('/content/featured-projects.json'),
          grab('/content/featured-certificates.json')
        ]).then(function (res) {
          FEATURED_REFS.projects = (res[0] && res[0].items || []).map(function (x) { return x && x.project; }).filter(Boolean);
          FEATURED_REFS.certs    = (res[1] && res[1].items || []).map(function (x) { return x && x.certificate; }).filter(Boolean);
          FEATURED_REFS.loaded  = true;
          FEATURED_REFS.loading = false;
          if (cb) cb();
        });
      }

      function injectFeaturedStars() {
        if (!document.querySelector("[class*='AppHeader']")) return; // CMS only, not login
        var m = (location.hash || '').match(/collections\/([^/?#]+)/);
        if (!m) return;
        var set = m[1] === 'projects'       ? (FEATURED_REFS.projects || [])
                : m[1] === 'certifications' ? (FEATURED_REFS.certs || [])
                : null;
        if (set === null) return; // not a collection we mark
        if (!FEATURED_REFS.loaded) { loadFeaturedRefs(injectFeaturedStars); return; }
        var cards = document.querySelectorAll("[class*='ListCard']");
        Array.prototype.forEach.call(cards, function (card) {
          // Idempotent: only add the ribbon once, so this never re-triggers the
          // MutationObserver into a loop (see the count-badge fix).
          if (card.querySelector('.fdz-feat-star')) return;
          // Decap nests matching classes (ListCard > ListCard…link), so
          // [class*='ListCard'] matches BOTH — only badge the OUTERMOST, else two
          // ribbons stack ("2 Featured").
          if (card.parentElement && card.parentElement.closest("[class*='ListCard']")) return;
          var text = card.textContent || '';
          var featured = false;
          for (var i = 0; i < set.length; i++) {
            if (set[i] && text.indexOf(set[i]) !== -1) { featured = true; break; }
          }

          star.className = 'fdz-feat-star';

          card.appendChild(star);
        });

      // ── Status card at the bottom of the sidebar nav ─────────────────────────
      // Shows when content + the CMS panel were last updated, and the last daily
      // backup. Data comes from /cms-status.json (written at build; same origin —
      // the backup date is read from the private backups/ folder at build time).
      var FDZ_STATUS = { data: null, loaded: false, loading: false };
      function loadCmsStatus(cb) {
        if (FDZ_STATUS.loaded) { if (cb) cb(); return; }
        if (FDZ_STATUS.loading) return;
        FDZ_STATUS.loading = true;
        fetch('/cms-status.json', { cache: 'no-store' })
          .then(function (r) { return r.ok ? r.json() : null; })
          .catch(function () { return null; })
          .then(function (d) { FDZ_STATUS.data = d; FDZ_STATUS.loaded = true; FDZ_STATUS.loading = false; if (cb) cb(); });
      }
      function fdzFmtDate(iso) {
        if (!iso) return '—';
        var d = new Date(iso);
        if (isNaN(d.getTime())) return String(iso);
        var mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
        return d.getDate() + ' ' + mon + ' ' + d.getFullYear();
      }
      function fdzDaysAgo(iso) {
        if (!iso) return Infinity;
        var d = new Date(iso); if (isNaN(d.getTime())) return Infinity;
        return Math.floor((Date.now() - d.getTime()) / 86400000);
      }
      function injectStatusCard() {
        if (!document.querySelector("[class*='AppHeader']")) return; // CMS only
        if (document.getElementById('fdz-status-card')) return;      // once
        if (!FDZ_STATUS.loaded) { loadCmsStatus(injectStatusCard); return; }
        if (!FDZ_STATUS.data) return;                                // fetch failed — no card
        var navList = document.querySelector("[class*='SidebarNavList']");

        var row = function (ic, k, v) {

          row('🔒', fdzL('Backup', 'Backup'), (s.lastBackup ? fdzFmtDate(bIso) + bBadge : '—')) +

      // Dismissal is stored per version: bump FDZ_ANNOUNCE_VER to publish a new
      // announcement and it will show once more, even to someone who dismissed
      // the previous one.
      var FDZ_ANNOUNCE_VER = 'v1';

        try { return localStorage.getItem('fdz-announce') === FDZ_ANNOUNCE_VER; }

            ) + '</p>' +
            '<div class="fdz-an-foot">' +
              '<a class="fdz-an-btn fdz-an-btn--ghost" href="mailto:apel@kedaiwebkamek.my">' + fdzL('Email us', 'Emel kami') + '</a>' +
              '<button type="button" class="fdz-an-btn fdz-an-btn--go" id="fdz-an-ok">' + fdzL('Got it', 'Faham') + '</button>' +

      // Auto-show, once per announcement version.
      function injectAnnouncement() {
        if (!document.querySelector("[class*='AppHeader']")) return; // CMS only, not login
        if (fdzAnnounceSeen()) return;                               // already dismissed
        fdzOpenAnnounce();
      }

      // Persistent button so the notice can always be re-read after dismissal.
      function injectAnnounceBtn() {
        if (!document.querySelector("[class*='AppHeader']")) return; // CMS only, not login
        if (document.getElementById('fdz-announce-btn')) return;     // once
        var b = document.createElement('button');
        b.id = 'fdz-announce-btn';
        b.type = 'button';
        b.innerHTML = '📣 ' + fdzL('Notice', 'Notis');
        b.addEventListener('click', fdzOpenAnnounce);
        document.body.appendChild(b);
      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && document.getElementById('fdz-announce')) fdzDismissAnnounce();
      });

      function brandLogin() {
        var authPage = document.querySelector('[class*="AuthenticationPage"]');
        if (!authPage) return;
        // Re-check by element (not a flag) so it self-heals if React re-renders
        if (document.getElementById('fdz-login-hero')) return;
        // Wait until Decap has rendered the login button
        if (!authPage.querySelector('button')) return;

        var hero = document.createElement('div');
        hero.id = 'fdz-login-hero';
        hero.innerHTML =
          '<div class="fdz-logo-chip"><img class="fdz-logo" src="/fdzeng-logo.png" alt="FDZ Engineering Sdn Bhd"></div>' +
          '<div class="fdz-rule"></div>' +
          '<div class="fdz-cms">Content Management System</div>' +
          '<div class="fdz-cms-sub">Panel Kandungan Laman Web Rasmi</div>';
        authPage.insertBefore(hero, authPage.firstChild);

        // Reassure first-time users about the GitHub redirect (the button below is
        // Decap's "Login with GitHub") — placed under the button, above the tag.
        if (!document.getElementById('fdz-login-note')) {
          var note = document.createElement('div');
          note.id = 'fdz-login-note';
          note.innerHTML = '&#128274; Anda akan dibawa ke GitHub untuk log masuk dengan selamat &mdash; ini normal. Gunakan email yang telah diberi akses.' +
            '<span class="add">Ingin menambah pengguna? Nyatakan kepada <a href="mailto:apel@kedaiwebkamek.my">apel@kedaiwebkamek.my</a>, kami akan menambah akses untuk anda.</span>' +
            '<span class="en">You&rsquo;ll be redirected to GitHub to sign in securely &mdash; this is normal. Use the email that has been granted access. To add a user, email apel@kedaiwebkamek.my and we&rsquo;ll set it up.</span>';
          authPage.appendChild(note);
        }

        var tag = document.createElement('div');
        tag.id = 'fdz-login-tag';
        tag.innerHTML = 'G7 Bumiputera Contractor &bull; Sarawak';
        authPage.appendChild(tag);

        if (!document.getElementById('fdz-login-foot')) {
          var foot = document.createElement('div');
          foot.id = 'fdz-login-foot';
          foot.innerHTML = 'Secure admin access &bull; www.fdzeng.com/admin';
          authPage.appendChild(foot);
        }
      }

      // Watch for the login page / CMS header to (re)appear and brand them
      // Run every self-healing CMS enhancer. Each is wrapped so one throwing can't
      // block the others (resilience), and calls are coalesced to one run per frame
      // via rAF with a runaway circuit-breaker — defence-in-depth against the class
      // of MutationObserver feedback loop that once froze the CMS after login.
      function runEnhancers() {
        var fns = [brandLogin, brandHeader, injectHelpPanel, injectCollectionCounts, injectFeaturedStars, injectLangToggle, injectStatusCard, injectAnnouncement, injectAnnounceBtn, translateTick];
        for (var i = 0; i < fns.length; i++) {
          try { fns[i](); }
          catch (e) { if (window.console && console.warn) console.warn('[FDZ CMS] enhancer failed:', e); }
        }
      }

      function fdzRaf(cb) {
        if (window.requestAnimationFrame) return window.requestAnimationFrame(cb);
        return window.setTimeout(cb, 16);
      }

      var _enhScheduled = false, _enhDisabled = false, _enhRuns = 0, _enhWindowStart = Date.now();
      function scheduleEnhancers() {
        if (_enhDisabled || _enhScheduled) return;
        _enhScheduled = true;
        fdzRaf(function () {
          _enhScheduled = false;
          var now = Date.now();
          if (now - _enhWindowStart > 2000) { _enhWindowStart = now; _enhRuns = 0; }
          // Circuit breaker: sustained ~60 runs/sec for 2s is a loop, not real use.
          if (++_enhRuns > 120) {
            _enhDisabled = true;
            enhanceObserver.disconnect();
            if (window.console && console.warn) console.warn('[FDZ CMS] enhancer runaway detected — observer disconnected to keep the UI responsive; reload the page.');
            return;
          }
          runEnhancers();
        });
      }

      var enhanceObserver = new MutationObserver(scheduleEnhancers);
      enhanceObserver.observe(document.body, { childList: true, subtree: true });
      // Re-run on collection navigation (list re-renders don't always mutate body).
      window.addEventListener('hashchange', scheduleEnhancers);

      runEnhancers();
      loadFeaturedRefs(injectFeaturedStars);
    });
  </script>

  <script src="/admin/vendor/decap-cms-3.3.3.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js';document.head.appendChild(s);"></script>


  <script>
    /* ── Conditional Year/Date field visibility ────────────────────────────────
       Watches the CMS form DOM and hides the Year and Tarikh fields (replacing
       them with an info overlay) whenever status is "Ongoing".                 */
    (function () {
      var YEAR_MSG_ID = 'fdz-cond-year-msg';
      var DATE_MSG_ID = 'fdz-cond-date-msg';

      var msgStyle = [
        'display:block',
        'background:#fff8e1',
        'border-left:4px solid #f59e0b',
        'padding:12px 16px',
        'border-radius:4px',
        'color:#92400e',
        'font-size:13px',
        'margin-top:4px'
      ].join(';');

      // Find the status <select> by locating an option with value "Ongoing"
      function findStatusSelect() {
        var selects = document.querySelectorAll('select');
        for (var i = 0; i < selects.length; i++) {
          for (var j = 0; j < selects[i].options.length; j++) {
            if (selects[i].options[j].value === 'Ongoing') return selects[i];
          }
        }
        return null;
      }

      // Walk up from a <label> to find the outermost field wrapper div:
      // the first ancestor that (a) has ≥2 children AND (b) contains a widget input.
      function findFieldWrapper(labelText) {
        var labels = document.querySelectorAll('label');
        for (var i = 0; i < labels.length; i++) {
          var lbl = labels[i];
          var txt = lbl.textContent.replace(/\s*\*\s*/g, '').replace(/\s+/g, ' ').trim();
          if (txt !== labelText) continue;
          var el = lbl;
          for (var k = 0; k < 6; k++) {
            var p = el.parentElement;
            if (!p || p === document.body) break;
            if (p.children.length >= 2 && p.querySelector('input, select, textarea')) {
              return p;
            }
            el = p;
          }
          // Fallback: 2 levels above label
          return lbl.parentElement ? lbl.parentElement.parentElement : null;
        }
        return null;
      }

      function applyVisibility(status) {
        var isOngoing = status === 'Ongoing';

        [
          { labelText: 'Tarikh Siap', msgId: DATE_MSG_ID, msg: '⏳ Projek masih berjalan — Tarikh siap belum ditetapkan' }
        ].forEach(function (item) {
          // Remove any existing overlay first
          var old = document.getElementById(item.msgId);
          if (old && old.parentNode) old.parentNode.removeChild(old);

          var wrapper = findFieldWrapper(item.labelText);
          if (!wrapper) return;

          if (isOngoing) {
            wrapper.style.display = 'none';
            var div = document.createElement('div');
            div.id = item.msgId;
            div.setAttribute('style', msgStyle);
            div.textContent = item.msg;
            wrapper.parentNode.insertBefore(div, wrapper);
          } else {
            wrapper.style.display = '';
          }
        });
      }

      function setup() {
        var sel = findStatusSelect();
        if (!sel) return;

        // Attach listeners only once per element instance
        if (!sel._fdzSetup) {
          sel._fdzSetup = true;
          var handler = function () { applyVisibility(sel.value); };
          sel.addEventListener('change', handler);
          sel.addEventListener('input', handler);
        }

        // Apply immediately: handles both initial load and navigation to an
        // existing "Ongoing" entry where fields should be hidden on open
        applyVisibility(sel.value);
      }

      // Debounce mutations — React re-renders fire dozens of callbacks at once
      var debounce = null;
      var observer = new MutationObserver(function () {
        clearTimeout(debounce);
        debounce = setTimeout(setup, 200);
      });

      observer.observe(document.body, { childList: true, subtree: true, attributes: true });

      // Try immediately in case CMS already rendered before this script ran
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', setup);
      } else {
        setup();
      }
    })();
  </script>

  <script>
    /* ── Collapse advanced/optional project fields to declutter the form ───────
       Groups "Detailed Description", "News Links" and "Video Links" under one
       collapsible "Maklumat Tambahan (pilihan)" toggle, collapsed by default.
       Reuses the same label-based field-wrapper lookup + MutationObserver
       self-healing used by the conditional-visibility scripts above. Written to
       be mutation-free once settled, so it never loops with its own observer.  */
    (function () {
      var TOGGLE_ID = 'fdz-adv-toggle';
      var ADV_LABELS = ['Detailed Description', 'News Links (Optional)', 'Video Links (Optional)'];
      var open = false;

      function findFieldWrapper(labelText) {
        var labels = document.querySelectorAll('label');
        for (var i = 0; i < labels.length; i++) {
          var lbl = labels[i];
          var txt = lbl.textContent.replace(/\s*\*\s*/g, '').replace(/\s+/g, ' ').trim();
          if (txt !== labelText) continue;
          var el = lbl;
          for (var k = 0; k < 6; k++) {
            var p = el.parentElement;
            if (!p || p === document.body) break;
            if (p.children.length >= 2 && p.querySelector('input, select, textarea')) return p;
            el = p;
          }
          return lbl.parentElement ? lbl.parentElement.parentElement : null;
        }
        return null;
      }

      function buildBar() {
        var bar = document.createElement('div');
        bar.id = TOGGLE_ID;
        bar.setAttribute('style', [
          'display:flex', 'align-items:center', 'gap:10px', 'cursor:pointer', 'user-select:none',
          'margin:18px 0 4px', 'padding:11px 14px', 'border:1px dashed #cfcfd4', 'border-radius:6px',
          'background:#fafafa', 'color:#2a2a2e', 'font-family:Inter,system-ui,sans-serif',
          'font-size:0.85rem', 'font-weight:600'
        ].join(';'));
        var car = document.createElement('span');
        car.className = 'fdz-adv-car';
        car.setAttribute('style', 'color:#b5000b;font-size:0.8rem;width:0.8em;');
        var txt = document.createElement('span');
        txt.setAttribute('style', 'flex:1 1 auto;');
        txt.textContent = 'Maklumat Tambahan (pilihan) — Penerangan Lanjut, Pautan Berita & Video';
        var hint = document.createElement('span');
        hint.className = 'fdz-adv-hint';
        hint.setAttribute('style', 'color:#8a8a90;font-weight:500;font-size:0.72rem;');
        bar.appendChild(car); bar.appendChild(txt); bar.appendChild(hint);
        bar.addEventListener('click', function () { open = !open; apply(); });
        return bar;
      }

      function apply() {
        var wraps = [];
        for (var i = 0; i < ADV_LABELS.length; i++) {
          var w = findFieldWrapper(ADV_LABELS[i]);
          if (w) wraps.push(w);
        }
        if (!wraps.length) return;                 // not on the project editor
        var first = wraps[0];

        var bar = document.getElementById(TOGGLE_ID);
        if (!bar || !bar.parentNode) bar = buildBar();
        if (first.parentNode && first.previousElementSibling !== bar) {
          first.parentNode.insertBefore(bar, first);
        }
        if (bar._open !== open) {                   // update chrome only on change
          bar._open = open;
          bar.querySelector('.fdz-adv-car').textContent = open ? '▾' : '▸';
          bar.querySelector('.fdz-adv-hint').textContent = open ? 'Klik untuk tutup' : 'Klik untuk buka';
        }
        var d = open ? '' : 'none';
        for (var j = 0; j < wraps.length; j++) {
          if (wraps[j].style.display !== d) wraps[j].style.display = d;
        }
      }

      var debounce = null;
      var observer = new MutationObserver(function () {
        clearTimeout(debounce);
        debounce = setTimeout(apply, 180);
      });
      observer.observe(document.body, { childList: true, subtree: true, attributes: true });

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', apply);
      } else {
        apply();
      }
    })();
  </script>
</body>
</html>
